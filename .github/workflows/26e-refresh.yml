name: 26E sector-load refresh

# Re-runs the event sector-load sim twice a day, picking up the latest
# Open-Meteo GFS forecast for the event day. GFS publishes 4x/day (00/06/12/18Z)
# with ~4-5h lag to Open-Meteo, so 04:15Z catches the 00Z cycle output
# and 16:15Z catches the 12Z cycle. Updated JSON is committed back;
# WHC's deploy.sh cron pulls it within 60s.

on:
  schedule:
    - cron: '15 4 * * *'      # 04:15 UTC daily
    - cron: '15 16 * * *'     # 16:15 UTC daily
  workflow_dispatch: {}       # allow manual run from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests numpy

      - name: Run sector-load sim
        run: python bin/26e-sector-load.py

      - name: Copy output to public/
        run: cp data/26E/sector-load.json public/26e-sector-load.json

      - name: Commit + push if changed
        run: |
          git config user.name  "26e-refresh-bot"
          git config user.email "26e-refresh-bot@users.noreply.github.com"
          git add data/26E/sector-load.json data/26E/winds-cache.json public/26e-sector-load.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "26e: scheduled refresh (event-day forecast)"
            git push
          fi
