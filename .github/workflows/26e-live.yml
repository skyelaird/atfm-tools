name: 26E live sector occupancy

# Pulls the current VATSIM v3 feed and writes a 15-min-bin snapshot of
# live occupancy in the CZQM/CZQX Topsky sector polygons to
# data/26E/live-load.json. Rolling 12h history. Companion to the
# CTP-prediction sim (26e-refresh.yml) — same schema, different
# data source (live feed vs booked routes).
#
# Running continuously 24/7 at 15-min cadence gives us:
#   - pre-event QA: sanity-check that the collector + polygons work
#   - live ATFM demand overview on event day
#   - post-event history in the committed JSON for replay/review
#
# Cost: 96 runs/day, each ~15s. Negligible.

on:
  schedule:
    # 5-min cadence during/around event days. VATSIM data.vatsim.net has
    # no formal rate limit and we're 1 request per run; 12 req/h is well
    # within polite usage. With BIN_MIN=5, every 5-min bin now gets a
    # real snapshot (no gaps) so the timeline view fills continuously.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# A queued run is always staler than its trigger. If a previous run is
# mid-flight when the next 5-min cron fires, kill the old one — its
# snapshot would just lose the rebase race anyway.
concurrency:
  group: 26e-live
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run live snapshot
        run: python bin/26e-live-sectors.py

      - name: Copy output to public/
        run: cp data/26E/live-load.json public/26e-live-load.json

      - name: Commit + push if changed
        run: |
          git config user.name  "26e-live-bot"
          git config user.email "26e-live-bot@users.noreply.github.com"

          # Retry loop: stash our snapshot, fetch latest main, re-apply
          # our snapshot wholesale (we own these files end-to-end —
          # no other process writes them), commit, push.  Up to 4 tries
          # in case main keeps moving from twice-daily 26e-refresh.yml.
          for attempt in 1 2 3 4; do
            if [ ! -f data/26E/live-load.json.snap ]; then
              cp data/26E/live-load.json data/26E/live-load.json.snap
              cp public/26e-live-load.json public/26e-live-load.json.snap
            fi
            git fetch origin main
            git reset --hard origin/main
            cp data/26E/live-load.json.snap data/26E/live-load.json
            cp public/26e-live-load.json.snap public/26e-live-load.json
            git add data/26E/live-load.json public/26e-live-load.json
            if git diff --cached --quiet; then
              echo "no changes (attempt $attempt)"
              break
            fi
            git commit -m "26e: live snapshot $(date -u +%H%MZ)"
            if git push; then
              echo "pushed on attempt $attempt"
              break
            fi
            echo "push failed on attempt $attempt; retrying with fresh main"
            sleep 3
          done
          rm -f data/26E/live-load.json.snap public/26e-live-load.json.snap
