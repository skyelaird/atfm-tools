name: Wind snapshot (4x daily)

# Captures Open-Meteo GFS forecast for the NAT/Canadian-airspace grid
# at lead times {T+0, +6, +12, +18, +24, +72, +168} once per GFS cycle.
# Builds a verification corpus for demand-curve-uncertainty modelling —
# see bin/wind-snapshot.py for rationale.
#
# Cron fires 4x/day to catch each GFS cycle (00/06/12/18Z) once data
# has propagated through Open-Meteo (~3-5h lag).  This guarantees
# every 6-hour-aligned target hour eventually gets a T+0 verifying
# analysis from the cycle that fires on it, so short-lead pairs
# (T+6/12/18) are verifiable too — not just the daily T+24/72/168
# of the original 1×/day design.
#
# Collection window: 1 month (late-April through late-May 2026) —
# spring-jet-stream conditions representative of next year's spring
# CTP.  Hard cutoff in bin/wind-snapshot.py (COLLECTION_END_UTC);
# past that the script no-ops so this cron can stay enabled.

on:
  schedule:
    # Each cron entry catches ONE GFS cycle.  GFS publishes ~3-5h after
    # the cycle hour; we run +5h to be safe (Open-Meteo's free tier can
    # lag the official NCEP feed by an hour).
    - cron: '0 5 * * *'    # 00Z cycle
    - cron: '0 11 * * *'   # 06Z cycle
    - cron: '0 17 * * *'   # 12Z cycle
    - cron: '0 23 * * *'   # 18Z cycle
  workflow_dispatch: {}

concurrency:
  group: wind-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run wind snapshot
        run: python bin/wind-snapshot.py

      - name: Commit + push if changed
        run: |
          git config user.name  "wind-snapshot-bot"
          git config user.email "wind-snapshot-bot@users.noreply.github.com"
          git add data/wind-archive/snapshots/
          if git diff --cached --quiet; then
            echo "no changes (already snapshotted today?)"
            exit 0
          fi
          git commit -m "wind: $(date -u +%Y-%m-%d) snapshot"
          for attempt in 1 2 3; do
            git fetch origin main
            git pull --rebase -X ours origin main
            if git push; then
              echo "pushed on attempt $attempt"
              break
            fi
            sleep 3
          done
