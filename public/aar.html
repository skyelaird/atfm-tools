<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>atfm-tools — Runway / AAR</title>
    <style>
        :root {
            --bg: #0f1419; --bg-elev: #1a2028; --bg-elev-hi: #242c38;
            --border: #2a3340;
            --text: #d7dee8; --text-dim: #8a94a3; --text-bright: #f0f4fa;
            --accent: #5eead4; --accent-dim: #2a6b5f;
            --warn: #facc15; --warn-dim: #5e4a0f;
            --alert: #f87171; --alert-dim: #5e1f1f;
            --ok: #4ade80; --ok-dim: #1e4a2e;
            --info: #60a5fa;
            --mono: "SF Mono", Consolas, Monaco, monospace;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; }
        a { color: var(--accent); text-decoration: none; }
        .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

        header { position: sticky; top: 0; z-index: 100; background: var(--bg-elev); border-bottom: 1px solid var(--border); padding: 0.65rem 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        header h1 { margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-bright); }
        .utc-clock { font-size: 0.95rem; color: var(--accent); font-variant-numeric: tabular-nums; padding: 0 0.6rem; border-left: 1px solid var(--border); }
        header .nav-pills { display: flex; gap: 0.5rem; margin-left: auto; }
        .pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: var(--bg-elev-hi); border: 1px solid var(--border); font-size: 0.75rem; color: var(--text-dim); text-decoration: none; }

        main { max-width: 2000px; margin: 0 auto; padding: 1rem; }
        .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        button.refresh { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; font-weight: 600; }
        button.refresh:hover { background: var(--accent); color: var(--bg); }
        .last-update { font-size: 0.75rem; color: var(--text-dim); }

        .airport-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        @media (max-width: 640px) { .airport-grid { grid-template-columns: 1fr; } main { padding: 0.5rem; } }
        @media (min-width: 1400px) { .airport-grid { grid-template-columns: repeat(4, 1fr); } }

        .apt-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; }
        .apt-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .apt-icao { font-size: 1.3rem; font-weight: 700; color: var(--text-bright); font-family: var(--mono); }
        .badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 600; }
        .wx-vfr { background: var(--ok-dim); color: var(--ok); }
        .wx-mvfr { background: #1e3a5f; color: var(--info); }
        .wx-ifr { background: var(--alert-dim); color: var(--alert); }
        .wx-lifr { background: #5e1f3f; color: #f472b6; }
        .badge-dry { background: var(--ok-dim); color: var(--ok); }
        .badge-wet { background: var(--warn-dim); color: var(--warn); }
        .badge-lahso { background: var(--ok-dim); color: var(--ok); }
        .badge-nolahso { background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); }

        .wind-line { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.3rem; }
        .wind-line .val { color: var(--text-bright); font-family: var(--mono); font-weight: 600; }

        .wx-extra { font-size: 0.7rem; margin-bottom: 0.5rem; }
        .wx-extra .cig-warn { color: var(--warn); }
        .wx-extra .vis-warn { color: var(--alert); }

        /* Runway cards — 2 rows of reciprocal pairs */
        .rwy-grid { margin-bottom: 0.6rem; }
        .rwy-row { display: flex; gap: 0.4rem; margin-bottom: 0.4rem; }
        .rwy-card {
            flex: 1; min-width: 0;
            background: var(--bg); border: 2px solid var(--border); border-radius: 8px;
            padding: 0.5rem; cursor: pointer; user-select: none; transition: all 0.15s;
        }
        .rwy-card:hover { border-color: var(--text-dim); }
        .rwy-card.unavail { opacity: 0.3; cursor: not-allowed; border-style: dashed; }
        .rwy-card .rwy-id { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--text-bright); }
        .rwy-card .rwy-role-badge {
            display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem;
            border-radius: 3px; margin-left: 0.3rem; vertical-align: middle;
        }
        .role-badge-A { background: #1e3a5f; color: var(--info); }
        .role-badge-D { background: #3b1f5e; color: #c084fc; }
        .role-badge-AD { background: var(--accent-dim); color: var(--accent); }
        .role-badge-off { background: var(--bg-elev-hi); color: var(--text-dim); }

        .rwy-card .wind-comps { display: flex; gap: 0.4rem; margin-top: 0.4rem; }
        .wind-comp {
            flex: 1; display: flex; align-items: center; gap: 0.2rem;
            padding: 0.25rem 0.4rem; border-radius: 4px; font-family: var(--mono);
            font-size: 0.8rem; font-weight: 600;
        }
        .wind-comp .arrow { font-size: 0.9rem; }
        /* Headwind */
        .hw-good { background: var(--ok-dim); color: var(--ok); }
        .hw-light { background: #1e3a2e; color: var(--ok); }
        .hw-tail-mild { background: var(--warn-dim); color: var(--warn); }
        .hw-tail-strong { background: var(--alert-dim); color: var(--alert); }
        /* Crosswind */
        .xw-light { background: var(--ok-dim); color: var(--ok); }
        .xw-mod { background: var(--warn-dim); color: var(--warn); }
        .xw-strong { background: var(--alert-dim); color: var(--alert); }

        .propose-btn { font-size: 0.7rem; background: none; border: 1px solid var(--accent-dim); color: var(--accent); border-radius: 3px; padding: 0.15rem 0.5rem; cursor: pointer; margin-left: auto; }
        .propose-btn:hover { background: var(--accent-dim); }

        /* Rate display */
        .rate-box { display: flex; align-items: center; padding: 0.5rem 0; border-top: 1px solid var(--border); margin-top: 0.3rem; gap: 0.8rem; }
        .rate-stack { display: flex; flex-direction: column; gap: 0.1rem; }
        .rate-row { display: flex; align-items: baseline; gap: 0.4rem; }
        .rate-num { font-size: 1.2rem; font-weight: 700; font-family: var(--mono); }
        .rate-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; width: 30px; }
        .rate-arr .rate-num { color: var(--ok); }
        .rate-dep .rate-num { color: var(--info); }
        .rate-total { margin-left: auto; text-align: center; }
        .rate-total .rate-num { font-size: 2rem; color: #c084fc; }
        .rate-total .rate-label { width: auto; font-size: 0.6rem; }
        .rate-calm { font-size: 0.6rem; color: var(--text-dim); margin-left: 0.5rem; font-family: var(--mono); }
        .rate-sub { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.2rem; }

        .metar-raw { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.3rem; word-break: break-all; cursor: pointer; max-height: 1.2em; overflow: hidden; transition: max-height 0.3s; }
        .metar-raw.expanded { max-height: 5em; }
        .metar-toggle { font-size: 0.55rem; color: var(--text-dim); cursor: pointer; }

        /* MIT planner */
        .mit-section { margin-top: 0.4rem; border-top: 1px dashed var(--border); padding-top: 0.3rem; }
        .mit-toggle { font-size: 0.7rem; background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 0; font-family: inherit; }
        .mit-toggle:hover { color: var(--accent); }
        .mit-body { font-size: 0.72rem; margin-top: 0.3rem; }
        .mit-controls { display: flex; gap: 0.3rem; align-items: center; margin-bottom: 0.3rem; font-size: 0.68rem; color: var(--text-dim); }
        .mit-win { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 0.1rem 0.3rem; font-size: 0.68rem; font-family: var(--mono); }
        .mit-table { width: 100%; border-collapse: collapse; }
        .mit-table th, .mit-table td { padding: 0.2rem 0.3rem; text-align: left; border-bottom: 1px solid var(--border); }
        .mit-table th { font-size: 0.6rem; color: var(--text-dim); font-weight: 400; text-transform: uppercase; letter-spacing: 0.03em; }
        .mit-table td { font-family: var(--mono); font-size: 0.72rem; }
        .mit-table .num { text-align: right; }
        .mit-input { width: 3em; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 0.05rem 0.2rem; font-family: var(--mono); font-size: 0.72rem; text-align: right; }
        .mit-bar { display: inline-block; height: 6px; background: var(--accent); border-radius: 1px; vertical-align: middle; }
        .mit-text { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 0.3rem; font-size: 0.65rem; font-family: var(--mono); margin-top: 0.3rem; resize: vertical; min-height: 3em; box-sizing: border-box; }
        .mit-copy { font-size: 0.65rem; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: 3px; padding: 0.15rem 0.5rem; cursor: pointer; margin-top: 0.2rem; }
        .mit-copy:hover { background: var(--accent); color: var(--bg); }
        .mit-over { color: var(--warn); font-weight: 600; }
        .mit-under { color: var(--text-dim); }
        .mit-headline { font-family: var(--mono); font-size: 0.72rem; margin-bottom: 0.3rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .mit-headline .chip { padding: 0.1rem 0.4rem; background: var(--bg-elev-hi); border: 1px solid var(--border); border-radius: 3px; }
        .mit-headline .chip.over { border-color: var(--warn); color: var(--warn); }
    </style>
</head>
<body>
<header>
    <h1>atfm-tools <span style="color:var(--text-dim)">Runway / AAR</span></h1>
    <span class="utc-clock mono" id="utc-clock">––:––:––Z</span>
    <div class="nav-pills">
        <a href="/dashboard.html" class="pill">dashboard</a>
        <a href="/reports.html" class="pill">reports</a>
        <a href="/perti.html" class="pill">perti</a>
        <a href="/guide.html" class="pill" title="FMP training manual / reference guide">guide ?</a>
    </div>
</header>
<main>
    <div class="controls">
        <button class="refresh" id="refresh-btn">Refresh METAR</button>
        <span class="last-update" id="last-update"></span>
    </div>
    <div class="airport-grid" id="grid"></div>
</main>
<script>
const AIRPORTS = ['CYVR','CYYC','CYWG','CYYZ','CYOW','CYUL','CYHZ'];
// Magnetic variation: Mag = True + MAG_VAR.
// West variation → positive (add to true), East variation → negative (subtract).
// Values from NOAA NCEI WMM calculator, epoch ~2025.
const MAG_VAR = { CYVR: -16, CYYC: -14, CYWG: -3, CYYZ: 11, CYOW: 14, CYUL: 15, CYHZ: 18 };
const AVWX_TOKEN = 'vmtkb1D8Tuva2Jw2tXihWcKE3m2sfDJkySBZygVx82I';
const PRECIP_CODES = ['RA','SN','DZ','TS','SH','FZ','GR','GS','PL','IC','UP'];
const MAX_TAILWIND = 5;
const MAX_XW_DRY = 30;
const MAX_XW_WET = 15;
const ROLE_CYCLE = ['off', 'A', 'D', 'A/D'];

let thresholdsByApt = {};
let configsByApt = {};
let aptState = {};

async function loadData() {
    const [thRes, cfgRes] = await Promise.all([
        fetch('/api/v1/debug/runway-thresholds'),
        fetch('/api/v1/runway-configs')
    ]);
    const thData = await thRes.json();
    thresholdsByApt = {};
    for (const t of thData) {
        if (!thresholdsByApt[t.airport_icao]) thresholdsByApt[t.airport_icao] = [];
        thresholdsByApt[t.airport_icao].push({ ident: t.runway_ident, hdg: t.heading_deg });
    }
    configsByApt = await cfgRes.json();
}

function windComponents(windDir, windSpd, rwyHdg) {
    const angle = ((windDir - rwyHdg + 360) % 360) * Math.PI / 180;
    return { headwind: Math.round(windSpd * Math.cos(angle)), crosswind: Math.round(windSpd * Math.sin(angle)) };
}

function isWet(m) {
    if (!m || !m.wx_codes) return false;
    return m.wx_codes.some(wx => PRECIP_CODES.some(p => (wx.repr || wx.value || '').toUpperCase().includes(p)));
}

function rwyAvailable(hw, xwAbs, wet) {
    if (hw < -MAX_TAILWIND) return false;
    return xwAbs <= (wet ? MAX_XW_WET : MAX_XW_DRY);
}

function autoPropose(icao) {
    const st = aptState[icao]; if (!st) return;
    const aptCfg = configsByApt[icao];
    const vmc = (st.rules === 'VFR' || st.rules === 'MVFR');
    for (const r of Object.values(st.runways)) r.role = 'off';
    if (aptCfg && aptCfg.configs) {
        // Two-tier selection: try non-exceptional configs first. Exceptional
        // configs (e.g. CYYZ 15/33) only get picked if every non-exceptional
        // config is out of tolerance — they are not allowed to win on a
        // headwind tiebreak against the preferred direction.
        const pick = (pool) => {
            // Composite score: declared rate + headwind bonus (0.5/kt) + ILS bonus (3 in IMC).
            // Headwind lets well-aligned configs beat poorly-aligned ones.
            // ILS bonus gives precision-approach runways an edge in IFR/LIFR.
            // E.g. CYHZ IFR: 14 (ILS, 17kt HW, rate 22) = 22+8.5+3 = 33.5
            //   vs 05 (1kt HW, rate 22) = 22+0.5+0 = 22.5.
            // Dual-parallel configs (rate 42+) still dominate single-runway.
            let best = null, bestScore = -999;
            for (const cfg of pool) {
                if (cfg.requires) { if (cfg.requires.dry && st.wet) continue; if (cfg.requires.vmc && !vmc) continue; }
                const arrRwy = st.runways[cfg.primary_arr]; if (!arrRwy || !arrRwy.avail) continue;
                if (cfg.primary_dep !== cfg.primary_arr) { const d = st.runways[cfg.primary_dep]; if (!d || !d.avail) continue; }
                const rate = cfg.declared_arr_rate || 0;
                const hwBonus = Math.max(0, arrRwy.hw) * 0.5;
                const ilsBonus = (!vmc && cfg.ils) ? 3 : 0;
                const score = rate + hwBonus + ilsBonus;
                if (score > bestScore) { bestScore = score; best = cfg; }
            }
            return best;
        };
        const preferred = aptCfg.configs.filter(c => !c.exceptional);
        const exceptional = aptCfg.configs.filter(c => c.exceptional);
        const best = pick(preferred) || pick(exceptional);
        if (best) { for (const [id, info] of Object.entries(best.runways)) { if (st.runways[id]) st.runways[id].role = info.role; } st.configName = best.label; st.selectedConfig = best; return; }
    }
    st.selectedConfig = null;
    const supplementary = new Set(aptCfg?._supplementary || []);
    let bestRwy = null, bestHw2 = -999;
    for (const [id, r] of Object.entries(st.runways)) { if (r.avail && r.hw > bestHw2 && !supplementary.has(id)) { bestHw2 = r.hw; bestRwy = id; } }
    if (bestRwy) { st.runways[bestRwy].role = 'A/D'; st.configName = bestRwy + ' (auto)'; return; }

    // Last resort: all runways fail the hard wind limits. Can't close an
    // airport over a few knots of extra crosswind — pick the "least worst"
    // runway. Score: minimize tailwind + crosswind excess over limits.
    // Skip supplementary/exceptional runways first, then fall back to any.
    const xwLimit = st.wet ? MAX_XW_WET : MAX_XW_DRY;
    const scoreRwy = (r) => {
        const tailwindExcess = Math.max(0, -r.hw - MAX_TAILWIND); // kt over 5kt tailwind
        const xwExcess = Math.max(0, r.xwAbs - xwLimit);          // kt over crosswind limit
        return tailwindExcess * 2 + xwExcess; // tailwind weighted 2x (worse for stopping)
    };
    let leastWorst = null, leastScore = 999;
    for (const [id, r] of Object.entries(st.runways)) {
        if (supplementary.has(id)) continue;
        const s = scoreRwy(r);
        if (s < leastScore) { leastScore = s; leastWorst = id; }
    }
    // If no primary runway usable, consider supplementary as last resort
    if (!leastWorst) {
        for (const [id, r] of Object.entries(st.runways)) {
            const s = scoreRwy(r);
            if (s < leastScore) { leastScore = s; leastWorst = id; }
        }
    }
    if (leastWorst) {
        st.runways[leastWorst].role = 'A/D';
        st.configName = leastWorst + ' (over limits)';
        st.overLimits = true;
    }
}

function hwClass(hw) {
    if (hw >= 5) return 'hw-good';
    if (hw >= 0) return 'hw-light';
    if (hw > -5) return 'hw-tail-mild';
    return 'hw-tail-strong';
}

function xwClass(xwAbs) {
    if (xwAbs <= 12) return 'xw-light';
    if (xwAbs <= 20) return 'xw-mod';
    return 'xw-strong';
}

function roleBadge(role) {
    if (role === 'A') return '<span class="rwy-role-badge role-badge-A">ARR</span>';
    if (role === 'D') return '<span class="rwy-role-badge role-badge-D">DEP</span>';
    if (role === 'A/D') return '<span class="rwy-role-badge role-badge-AD">A/D</span>';
    return '<span class="rwy-role-badge role-badge-off">OFF</span>';
}

function renderCard(icao) {
    const st = aptState[icao];
    if (!st) return `<span class="apt-icao">${icao}</span> No data`;
    const wxCls = { VFR: 'wx-vfr', MVFR: 'wx-mvfr', IFR: 'wx-ifr', LIFR: 'wx-lifr' }[st.rules] || '';
    // LAHSO only available if the airport has LAHSO configs defined
    const aptCfgData = configsByApt[icao];
    const hasLahsoConfigs = (aptCfgData?.configs || []).some(c => c.mode === 'lahso');
    const lahso = hasLahsoConfigs && !st.wet && (st.rules === 'VFR' || st.rules === 'MVFR');
    const lahsoReason = !lahso && hasLahsoConfigs
        ? (st.wet && !(st.rules === 'VFR' || st.rules === 'MVFR') ? 'Requires VMC + dry runway'
           : st.wet ? 'Requires dry runway' : 'Requires VMC') : '';

    // Group into reciprocal pairs for 2-row display.
    // Uses global reciprocalIdent() — same physical strip.
    const allRwys = Object.entries(st.runways);
    // Take runways with heading < 180 as row 1 (or lower number)
    const row1ids = [], row2ids = [];
    const used = new Set();
    // Sort by ident number then suffix for consistent column order
    allRwys.sort((a, b) => {
        const na = parseInt(a[0]), nb = parseInt(b[0]);
        if (na !== nb) return na - nb;
        return a[0].localeCompare(b[0]);
    });
    for (const [id] of allRwys) {
        if (used.has(id)) continue;
        const rid = reciprocalIdent(id);
        if (rid && st.runways[rid] && !used.has(rid)) {
            // Lower number goes to row 1
            const n1 = parseInt(id), n2 = parseInt(rid);
            if (n1 <= n2) { row1ids.push(id); row2ids.push(rid); }
            else { row1ids.push(rid); row2ids.push(id); }
            used.add(id); used.add(rid);
        } else {
            row1ids.push(id); row2ids.push(null);
            used.add(id);
        }
    }

    function rwyCardHtml(ident) {
        if (!ident) return '<div class="rwy-card" style="visibility:hidden"></div>';
        const r = st.runways[ident]; if (!r) return '';
        const unavail = !r.avail ? 'unavail' : '';
        const hwArrow = r.hw >= 0 ? '↓' : '↑';
        const hwAbs = Math.abs(r.hw);
        const tooltip = r.avail ? `${ident} ${r.hdg}° | Click to toggle` : `UNAVAILABLE: ${r.unavailReason}`;
        return `<div class="rwy-card ${unavail}" title="${tooltip}" onclick="toggleRwy('${icao}','${ident}')">
            <span class="rwy-id">${ident}</span>${roleBadge(r.role)}
            <div class="wind-comps">
                <div class="wind-comp ${hwClass(r.hw)}"><span class="arrow">${hwArrow}</span>${hwAbs}</div>
                <div class="wind-comp ${xwClass(r.xwAbs)}"><span class="arrow">↔</span>${r.xwAbs}</div>
            </div>
        </div>`;
    }

    // Row 1: lower numbers, Row 2: reciprocals aligned below
    const row1 = row1ids.map(id => rwyCardHtml(id)).join('');
    const row2 = row2ids.map(id => rwyCardHtml(id)).join('');
    const cards = `<div class="rwy-row">${row1}</div><div class="rwy-row">${row2}</div>`;

    return `
        <div class="apt-header">
            <span class="apt-icao">${icao}</span>
            <span class="badge ${wxCls}">${st.rules}</span>
            <span class="badge ${st.wet ? 'badge-wet' : 'badge-dry'}">${st.wet ? 'WET' : 'DRY'}</span>
            ${hasLahsoConfigs ? (lahso ? '<span class="badge badge-lahso">LAHSO</span>' : '<span class="badge badge-nolahso" title="' + lahsoReason + '">no LAHSO</span>') : ''}
            <button class="propose-btn" onclick="propose('${icao}')">Auto</button>
        </div>
        <div class="wind-line"><span class="val">${st.windDir}°M/${st.effectiveWind}kt</span>${st.gustSpd > st.windSpd ? ` G${st.gustSpd}` : ''} ${st.configName ? '| ' + st.configName : ''}</div>
        <div class="rwy-grid">${cards}</div>
        <div class="rate-box">
            <div class="rate-stack">
                <div class="rate-row rate-arr"><span class="rate-label">AAR</span><span class="rate-num" id="aar-${icao}">—</span><span class="rate-calm" id="aar-calm-${icao}"></span></div>
                <div class="rate-row rate-dep"><span class="rate-label">ADR</span><span class="rate-num" id="adr-${icao}">—</span></div>
            </div>
            <div class="rate-total"><div class="rate-num" id="total-${icao}">—</div><div class="rate-label">movements</div></div>
        </div>
        <div class="rate-sub" id="rate-detail-${icao}"></div>
        <div class="metar-raw" onclick="this.classList.toggle('expanded')">${st.metar || ''}</div>
        <div class="mit-section">
            <button class="mit-toggle" onclick="toggleMit('${icao}'); event.stopPropagation();">MIT planner ▾</button>
            <div class="mit-body" id="mit-body-${icao}" style="display:none;"></div>
        </div>
    `;
}

// Reciprocal ident: 08L↔26R, 05↔23, same physical strip
function reciprocalIdent(id) {
    const m = id.match(/^(\d+)(L|R|C)?$/);
    if (!m) return null;
    let num = parseInt(m[1]), sfx = m[2] || '';
    let rNum = num <= 18 ? num + 18 : num - 18;
    let rSfx = sfx === 'L' ? 'R' : sfx === 'R' ? 'L' : sfx;
    return String(rNum).padStart(2, '0') + rSfx;
}

function toggleRwy(icao, ident) {
    const st = aptState[icao]; if (!st || !st.runways[ident] || !st.runways[ident].avail) return;
    const r = st.runways[ident];
    r.role = ROLE_CYCLE[(ROLE_CYCLE.indexOf(r.role) + 1) % ROLE_CYCLE.length];

    // Activating one end turns off the opposite end (same physical strip)
    if (r.role !== 'off') {
        const rid = reciprocalIdent(ident);
        if (rid && st.runways[rid] && st.runways[rid].role !== 'off') {
            st.runways[rid].role = 'off';
        }
    }

    // Manual override — drop the previously-selected config so computeRates
    // falls back to the heuristic (A/D single-runway dep factor). Without
    // this, single-RWY A/D would still inherit the dual-parallel dep rate
    // from the config, yielding AAR + ADR totals that exceed what one
    // runway can actually deliver.
    st.configName = 'Manual';
    st.selectedConfig = null;
    refreshCard(icao);
}

function propose(icao) { autoPropose(icao); refreshCard(icao); }

function refreshCard(icao) {
    const card = document.querySelector(`[data-card="${icao}"]`);
    if (card) {
        card.innerHTML = renderCard(icao);
        computeRates(icao);
        // Rehydrate MIT panel if it was open
        if (mitOpen[icao]) refreshMit(icao);
    }
}

// ---------- MIT planner ----------
//
// Concept: given the declared AAR at this airport and the observed
// demand distribution over each metering fix in a forward window,
// allocate the AAR proportionally to demand share. MIT at each fix is
// suggested from the fair-share rate; FMP tweaks as needed and pastes
// the request into a message to the adjacent centre / sector.
//
// Math: fair_share_rate (per hr) = AAR * (fix_demand / total_demand).
// MIT (nm) = airport_final_spacing / fix_share, where
//   airport_final_spacing = (60 / AAR) * approach_GS_nm_per_min.
// Defaults to 240 kt approach (4 nm/min), rounded up to nearest 5nm,
// min 10nm. Fixes already under their fair share get no MIT (—).

const APPROACH_GS_NM_PER_MIN = 4.0;  // 240 kt at the metering fix
const MIT_ROUND_NM = 5;
const MIT_MIN_NM = 10;
const mitOpen = {};     // icao -> bool
const mitWindow = {};   // icao -> minutes
const mitOverride = {}; // icao -> {fix: nm}
const mitCache = {};    // icao -> last fetched /metering payload

function toggleMit(icao) {
    const body = document.getElementById('mit-body-' + icao);
    if (!body) return;
    const wasOpen = body.style.display !== 'none';
    body.style.display = wasOpen ? 'none' : 'block';
    mitOpen[icao] = !wasOpen;
    // Update toggle text
    const btn = body.previousElementSibling;
    if (btn) btn.textContent = 'MIT planner ' + (wasOpen ? '▾' : '▴');
    if (!wasOpen) refreshMit(icao);
}

function getAar(icao) {
    const st = aptState[icao]; if (!st) return null;
    // computeRates stored aar via innerText on #aar-<icao>
    const el = document.getElementById('aar-' + icao);
    if (!el) return null;
    const n = parseInt(el.textContent, 10);
    return isFinite(n) && n > 0 ? n : null;
}

function suggestMit(aar, share) {
    if (!aar || !share || share <= 0) return null;
    const airportSpacingNm = (60 / aar) * APPROACH_GS_NM_PER_MIN;
    const raw = airportSpacingNm / share;
    const rounded = Math.ceil(raw / MIT_ROUND_NM) * MIT_ROUND_NM;
    return Math.max(MIT_MIN_NM, rounded);
}

async function refreshMit(icao) {
    const body = document.getElementById('mit-body-' + icao);
    if (!body) return;
    const win = mitWindow[icao] || 120;
    body.innerHTML = '<div class="muted">Loading demand…</div>';
    try {
        const r = await fetch(`/api/v1/metering?airport=${icao}&window=${win}`);
        const d = await r.json();
        mitCache[icao] = d;
        renderMitPanel(icao);
    } catch (e) {
        body.innerHTML = '<div style="color:var(--alert);">Failed to load: ' + e.message + '</div>';
    }
}

function setMitOverride(icao, fix, nm) {
    mitOverride[icao] = mitOverride[icao] || {};
    mitOverride[icao][fix] = Number(nm);
    renderMitPanel(icao);
}

function renderMitPanel(icao) {
    const data = mitCache[icao];
    if (!data) return;
    const body = document.getElementById('mit-body-' + icao);
    if (!body) return;
    const aar = getAar(icao);
    const win = mitWindow[icao] || 120;
    const fixesByIcao = (data.by_airport && data.by_airport[icao]) || {};
    const fixEntries = Object.entries(fixesByIcao);

    // Also include all catalog fixes with zero count for completeness.
    // We don't have the catalog on this page, so just use whatever the
    // server returned (non-zero); zero-demand fixes can be inferred
    // from "no constraint needed".

    const totalDemand = fixEntries.reduce((s, [,v]) => s + v.count, 0);
    // Demand per hour scaled from observed window
    const hoursWin = win / 60;
    const demandPerHr = totalDemand / hoursWin;
    const overCapacity = aar && demandPerHr > aar;

    const winSel = `<select class="mit-win" onchange="mitWindow['${icao}']=Number(this.value); refreshMit('${icao}')">` +
        [60, 120, 240].map(m => `<option value="${m}"${m===win?' selected':''}>${m}m</option>`).join('') +
        '</select>';

    let html = `<div class="mit-controls">
        window ${winSel}
        · AAR <span class="mono" style="color:var(--text)">${aar || '—'}/hr</span>
    </div>`;

    html += `<div class="mit-headline">
        <span class="chip">${totalDemand} arr next ${win}m</span>
        <span class="chip">~${demandPerHr.toFixed(1)}/hr observed</span>
        <span class="chip${overCapacity?' over':''}">${aar ? Math.round(demandPerHr/aar*100) : '—'}% of AAR</span>
    </div>`;

    if (fixEntries.length === 0) {
        html += '<div class="muted" style="padding:0.2rem 0;">No inbound flights resolved to a metering fix in this window.</div>';
        body.innerHTML = html;
        return;
    }

    fixEntries.sort((a, b) => b[1].count - a[1].count);
    html += `<table class="mit-table"><thead><tr>
        <th>Fix</th><th class="num">N</th><th class="num">Share</th><th class="num">Fair/hr</th><th class="num">MIT (nm)</th>
    </tr></thead><tbody>`;

    const tooHigh = [];
    const okFixes = [];
    const rows = [];
    for (const [fix, info] of fixEntries) {
        const share = totalDemand > 0 ? info.count / totalDemand : 0;
        const fairRate = aar ? aar * share : null;
        // Only suggest MIT when demand > fair share would be (i.e. fix is over-represented)
        const airportSpacing = aar ? (60 / aar) * APPROACH_GS_NM_PER_MIN : null;
        // MIT is applied when airport is over capacity (demand > AAR) AND fix share > 0
        const needed = overCapacity && share > 0;
        const suggested = needed ? suggestMit(aar, share) : null;
        const override = mitOverride[icao]?.[fix];
        const current = override ?? suggested;
        rows.push({fix, share, fairRate, suggested, current, count: info.count, needed});
    }

    for (const r of rows) {
        const pct = (r.share * 100).toFixed(0);
        const barW = Math.min(100, r.share * 100);
        const mitCell = r.needed
            ? `<input type="number" class="mit-input" value="${r.current}" min="0" step="5" onchange="setMitOverride('${icao}','${r.fix}',this.value)"/>`
            : '<span class="mit-under">—</span>';
        html += `<tr>
            <td>${r.fix}</td>
            <td class="num">${r.count}</td>
            <td class="num"><span class="mit-bar" style="width:${barW*0.6}px;"></span> ${pct}%</td>
            <td class="num">${r.fairRate ? r.fairRate.toFixed(1) : '—'}</td>
            <td class="num">${mitCell}</td>
        </tr>`;
    }
    html += '</tbody></table>';

    // Compose request text
    const activeMits = rows.filter(r => r.needed && r.current);
    if (activeMits.length > 0 && overCapacity) {
        const now = new Date();
        const end = new Date(now.getTime() + win * 60000);
        const hh = d => String(d.getUTCHours()).padStart(2, '0') + String(d.getUTCMinutes()).padStart(2, '0');
        const lines = activeMits.map(r => `  • ${r.current} MIT over ${r.fix}`).join('\n');
        const msg = `${icao} FMP → adjacent centres:
Request Miles in Trail effective ${hh(now)}Z until ${hh(end)}Z:
${lines}
${icao} AAR ${aar}/hr, observed demand ~${demandPerHr.toFixed(0)}/hr (${Math.round(demandPerHr/aar*100)}%).`;
        html += `<textarea class="mit-text" readonly>${msg}</textarea>
        <button class="mit-copy" onclick="navigator.clipboard.writeText(this.previousElementSibling.value); this.textContent='Copied ✓'; setTimeout(()=>this.textContent='Copy request text',1500);">Copy request text</button>`;
    } else if (!overCapacity && aar) {
        html += `<div class="muted" style="padding:0.3rem 0; font-size:0.68rem;">Demand is within AAR — no MIT needed.</div>`;
    }

    html += `<div class="muted" style="font-size:0.62rem; margin-top:0.4rem;">Fair/hr is the per-fix rate that keeps total demand ≤ AAR. The MIT suggestion is a bucket only — adjacent ATC will refine tactical spacing. Edit any value to override.</div>`;

    body.innerHTML = html;
}

async function computeRates(icao) {
    const st = aptState[icao]; if (!st) return;
    const arrRwys = Object.entries(st.runways).filter(([, r]) => r.role === 'A' || r.role === 'A/D');
    const depRwys = Object.entries(st.runways).filter(([, r]) => r.role === 'D' || r.role === 'A/D');
    const el = (id, t) => { const e = document.getElementById(id); if (e) e.textContent = t; };
    if (!arrRwys.length && !depRwys.length) { el(`aar-${icao}`, '—'); el(`adr-${icao}`, '—'); el(`total-${icao}`, '—'); el(`rate-detail-${icao}`, 'No active runways'); return; }

    // Facility-declared rates from selected config. This mirrors the FAA FOA
    // Ch.10 §7 / ASPM SAER model: AAR and ADR are facility-declared hourly
    // values per (runway config × weather class), not computed per-flight.
    // The wind-aware wake-separation calculator is a "what can physics
    // support" check; the declared value is what the facility publishes.
    // We show both and take the lower of (declared, achievable) as the
    // rate the allocator should use — facility won't exceed its own declaration.
    const cfg = st.selectedConfig;
    const declaredArr = cfg?.declared_arr_rate || null;
    const declaredDep = cfg?.declared_dep_rate || null;

    let achievableArr = 0, calmArr = 0, details = [];
    for (const [ident, r] of arrRwys) {
        try {
            // Fetch wind-adjusted and calm (zero headwind) rates in parallel
            const [res, resCal] = await Promise.all([
                fetch(`/api/v1/aar/calculate?airport=${icao}&headwind=${r.hw}`),
                fetch(`/api/v1/aar/calculate?airport=${icao}&headwind=0`),
            ]);
            const d = await res.json();
            const dCal = await resCal.json();
            // Interleaved A/D single-runway loses ~40% of slots to deps (FAA
            // Ch.10 §7: mixed ops reduce arrival capacity to give dep windows).
            const adFactor = r.role === 'A/D' ? 0.6 : 1;
            const rate = Math.round(d.aar * adFactor);
            const calmRate = Math.round(dCal.aar * adFactor);
            achievableArr += rate; calmArr += calmRate;
            details.push(`${ident}:${rate}A`);
        } catch (e) {}
    }

    // ADR: prefer declared. Fall back to legacy heuristic only if no config
    // is selected (manual runway toggles with no matching config).
    let totalDep = 0;
    if (declaredDep !== null) {
        totalDep = declaredDep;
        for (const [ident, r] of depRwys) details.push(`${ident}:${r.role === 'A/D' ? 'mixed' : 'D'}`);
    } else {
        for (const [ident, r] of depRwys) {
            const rate = r.role === 'D' ? 20 : Math.min(Math.round(achievableArr * 0.4 / 0.6), 12);
            totalDep += rate; details.push(`${ident}:${rate}D`);
        }
    }

    // Operational AAR = min(declared, achievable). FAA facilities never
    // publish above their declared rate even if wx supports more.
    // Cap calm rate by declared — physics doesn't know about ROT/exit geometry,
    // so wake-sep calm can exceed what the runway actually supports.
    const calmCapped = (declaredArr !== null) ? Math.min(declaredArr, calmArr) : calmArr;
    const opArr = (declaredArr !== null) ? Math.min(declaredArr, achievableArr) : achievableArr;
    const aarCell = document.getElementById(`aar-${icao}`);
    if (aarCell) {
        aarCell.textContent = `${opArr}/hr`;
        const gap = calmCapped - opArr;
        if (gap >= 1) {
            // Wind is reducing rate below calm capacity — colour-code severity
            aarCell.style.color = gap >= 8 ? 'var(--alert)' : gap >= 4 ? 'var(--warn)' : 'var(--info)';
            aarCell.title = `Wind-reduced by ${gap} from calm ${calmCapped}/hr`;
        } else {
            aarCell.style.color = '';
            aarCell.title = '';
        }
        // Show calm reference underneath when wind-reduced
        const calmRef = document.getElementById(`aar-calm-${icao}`);
        if (calmRef) calmRef.textContent = gap >= 1 ? `calm ${calmCapped}` : '';
    }
    el(`adr-${icao}`, `${totalDep}/hr`);
    el(`total-${icao}`, `${opArr + totalDep}`);
    el(`rate-detail-${icao}`, details.join(' | '));

    // Persist active config to server — single source of truth for FSM,
    // dashboard, allocator. Fire-and-forget POST.
    fetch('/api/v1/active-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ airport: icao, config: cfg?.label || null, arr_rate: opArr, dep_rate: totalDep }),
    }).catch(() => {});
}

async function loadAll() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div style="color:var(--text-dim);padding:1rem;">Loading...</div>';
    await loadData();
    const metars = await Promise.all(AIRPORTS.map(async icao => {
        try { const r = await fetch(`https://avwx.rest/api/metar/${icao}?token=${AVWX_TOKEN}`); return { icao, data: await r.json() }; }
        catch (e) { return { icao, data: null }; }
    }));
    for (const { icao, data: m } of metars) {
        if (!m) { aptState[icao] = null; continue; }
        const windDirTrue = parseInt(m.wind_direction?.value || 0), windSpd = parseInt(m.wind_speed?.value || 0);
        const windDir = (windDirTrue + (MAG_VAR[icao] || 0) + 360) % 360;
        const gustSpd = parseInt(m.wind_gust?.value || windSpd), effectiveWind = Math.max(windSpd, gustSpd);
        const wet = isWet(m), rules = m.flight_rules || '?';
        const vfrOnly = new Set(configsByApt[icao]?._vfr_only || []);
        const rwys = {};
        for (const t of (thresholdsByApt[icao] || [])) {
            if (vfrOnly.has(t.ident)) continue;
            const wc = windComponents(windDir, effectiveWind, t.hdg), xwAbs = Math.abs(wc.crosswind);
            const xwLimit = wet ? MAX_XW_WET : MAX_XW_DRY, avail = rwyAvailable(wc.headwind, xwAbs, wet);
            let unavailReason = '';
            if (!avail) { const rs = []; if (wc.headwind < -MAX_TAILWIND) rs.push(`TW ${Math.abs(wc.headwind)}kt (max ${MAX_TAILWIND})`); if (xwAbs > xwLimit) rs.push(`XW ${xwAbs}kt (max ${xwLimit}${wet?' wet':''})`); unavailReason = rs.join(', '); }
            rwys[t.ident] = { hdg: t.hdg, hw: wc.headwind, xw: wc.crosswind, xwAbs, avail, unavailReason, role: 'off' };
        }
        aptState[icao] = { windDir, windSpd, gustSpd, effectiveWind, wet, rules, runways: rwys, metar: m.raw || '', configName: '' };
        autoPropose(icao);
    }
    grid.innerHTML = '';
    for (const icao of AIRPORTS) {
        const card = document.createElement('div'); card.className = 'apt-card'; card.setAttribute('data-card', icao);
        card.innerHTML = renderCard(icao); grid.appendChild(card); computeRates(icao);
    }
    document.getElementById('last-update').textContent = `Updated ${new Date().toISOString().substring(11, 16)}Z`;
}

document.getElementById('refresh-btn').addEventListener('click', loadAll);
loadAll();
setInterval(loadAll, 300000);

// UTC clock in header
function updateUtcClock() {
    const n = new Date();
    const p = v => String(v).padStart(2, '0');
    const el = document.getElementById('utc-clock');
    if (el) el.textContent = `${p(n.getUTCHours())}:${p(n.getUTCMinutes())}:${p(n.getUTCSeconds())}Z`;
}
updateUtcClock();
setInterval(updateUtcClock, 1000);
</script>
</body>
</html>
