<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>atfm-tools — Runway / AAR</title>
    <style>
        :root {
            --bg: #0f1419; --bg-elev: #1a2028; --bg-elev-hi: #242c38;
            --border: #2a3340;
            --text: #d7dee8; --text-dim: #8a94a3; --text-bright: #f0f4fa;
            --accent: #5eead4; --accent-dim: #2a6b5f;
            --warn: #facc15; --warn-dim: #5e4a0f;
            --alert: #f87171; --alert-dim: #5e1f1f;
            --ok: #4ade80; --ok-dim: #1e4a2e;
            --info: #60a5fa;
            --arr: #60a5fa; --arr-dim: #1e3a5f;
            --dep: #c084fc; --dep-dim: #3b1f5e;
            --mono: "SF Mono", Consolas, Monaco, monospace;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; }
        a { color: var(--accent); text-decoration: none; }
        .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

        header { position: sticky; top: 0; z-index: 100; background: var(--bg-elev); border-bottom: 1px solid var(--border); padding: 0.65rem 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        header h1 { margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-bright); }
        header .nav-pills { display: flex; gap: 0.5rem; margin-left: auto; }
        .pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: var(--bg-elev-hi); border: 1px solid var(--border); font-size: 0.75rem; color: var(--text-dim); text-decoration: none; }

        main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
        .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        button.refresh { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; font-weight: 600; }
        button.refresh:hover { background: var(--accent); color: var(--bg); }
        .last-update { font-size: 0.75rem; color: var(--text-dim); }

        .airport-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
        .apt-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
        .apt-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
        .apt-icao { font-size: 1.2rem; font-weight: 700; color: var(--text-bright); font-family: var(--mono); }
        .badge { font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 3px; font-weight: 600; }
        .wx-vfr { background: var(--ok-dim); color: var(--ok); }
        .wx-mvfr { background: #1e3a5f; color: var(--info); }
        .wx-ifr { background: var(--alert-dim); color: var(--alert); }
        .wx-lifr { background: #5e1f3f; color: #f472b6; }
        .badge-dry { background: var(--ok-dim); color: var(--ok); }
        .badge-wet { background: var(--warn-dim); color: var(--warn); }
        .badge-lahso { background: var(--ok-dim); color: var(--ok); }
        .badge-nolahso { background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); }

        .wind-line { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.6rem; }
        .wind-line .val { color: var(--text-bright); font-family: var(--mono); }

        /* Runway selector grid */
        .rwy-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; }
        .rwy-chip {
            display: flex; flex-direction: column; align-items: center;
            padding: 0.3rem 0.6rem; border-radius: 6px; cursor: pointer;
            border: 2px solid var(--border); background: var(--bg);
            min-width: 52px; transition: all 0.15s;
            user-select: none;
        }
        .rwy-chip:hover { border-color: var(--text-dim); }
        .rwy-chip.unavail { opacity: 0.25; cursor: not-allowed; border-style: dashed; }
        .rwy-chip .rwy-id { font-family: var(--mono); font-size: 0.85rem; font-weight: 700; color: var(--text-bright); }
        .rwy-chip .rwy-role { font-size: 0.6rem; font-weight: 600; margin-top: 0.1rem; }
        .rwy-chip .rwy-wind { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.1rem; }
        .rwy-chip.role-A { border-color: var(--arr); background: var(--arr-dim); }
        .rwy-chip.role-A .rwy-role { color: var(--arr); }
        .rwy-chip.role-D { border-color: var(--dep); background: var(--dep-dim); }
        .rwy-chip.role-D .rwy-role { color: var(--dep); }
        .rwy-chip.role-AD { border-color: var(--accent); background: var(--accent-dim); }
        .rwy-chip.role-AD .rwy-role { color: var(--accent); }
        .rwy-chip.role-off { border-color: var(--border); background: var(--bg); }
        .rwy-chip.role-off .rwy-role { color: var(--text-dim); }
        .rwy-chip.role-off .rwy-id { color: var(--text-dim); }

        .rate-box { display: flex; gap: 1.5rem; align-items: baseline; padding: 0.6rem 0; border-top: 1px solid var(--border); margin-top: 0.4rem; flex-wrap: wrap; }
        .rate-item { text-align: center; }
        .rate-num { font-size: 1.5rem; font-weight: 700; font-family: var(--mono); }
        .rate-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
        .rate-arr .rate-num { color: var(--arr); }
        .rate-dep .rate-num { color: var(--dep); }
        .rate-total .rate-num { color: var(--accent); }
        .rate-declared { font-size: 0.7rem; color: var(--text-dim); }
        .rate-declared .val { font-family: var(--mono); }
        .rate-sub { font-size: 0.65rem; color: var(--text-dim); width: 100%; }

        .metar-raw { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.4rem; word-break: break-all; }

        .propose-btn { font-size: 0.65rem; background: none; border: 1px solid var(--accent-dim); color: var(--accent); border-radius: 3px; padding: 0.15rem 0.4rem; cursor: pointer; margin-left: auto; }
        .propose-btn:hover { background: var(--accent-dim); }
    </style>
</head>
<body>
<header>
    <h1>atfm-tools <span style="color:var(--text-dim)">Runway / AAR</span></h1>
    <div class="nav-pills">
        <a href="/dashboard.html" class="pill">dashboard</a>
        <a href="/reports.html" class="pill">reports</a>
        <a href="/perti.html" class="pill">perti</a>
    </div>
</header>
<main>
    <div class="controls">
        <button class="refresh" id="refresh-btn">Refresh METAR</button>
        <span class="last-update" id="last-update"></span>
    </div>
    <div class="airport-grid" id="grid"></div>
</main>
<script>
const AIRPORTS = ['CYHZ','CYOW','CYUL','CYVR','CYWG','CYYC','CYYZ'];
const AVWX_TOKEN = 'vmtkb1D8Tuva2Jw2tXihWcKE3m2sfDJkySBZygVx82I';
const PRECIP_CODES = ['RA','SN','DZ','TS','SH','FZ','GR','GS','PL','IC','UP'];
const MAX_TAILWIND = 5;
const MAX_XW_DRY = 25;
const MAX_XW_WET = 15;
const ROLE_CYCLE = ['off', 'A', 'D', 'A/D'];

let thresholdsByApt = {};
let configsByApt = {};
// Per-airport state: { icao: { runways: { ident: { role, hdg, hw, xw, avail } }, metar, wet, rules } }
let aptState = {};

async function loadData() {
    const [thRes, cfgRes] = await Promise.all([
        fetch('/api/v1/debug/runway-thresholds'),
        fetch('/api/v1/runway-configs')
    ]);
    const thData = await thRes.json();
    thresholdsByApt = {};
    for (const t of thData) {
        if (!thresholdsByApt[t.airport_icao]) thresholdsByApt[t.airport_icao] = [];
        thresholdsByApt[t.airport_icao].push({ ident: t.runway_ident, hdg: t.heading_deg });
    }
    configsByApt = await cfgRes.json();
}

function windComponents(windDir, windSpd, rwyHdg) {
    const angle = ((windDir - rwyHdg + 360) % 360) * Math.PI / 180;
    return { headwind: Math.round(windSpd * Math.cos(angle)), crosswind: Math.round(windSpd * Math.sin(angle)) };
}

function isWet(m) {
    if (!m || !m.wx_codes) return false;
    return m.wx_codes.some(wx => PRECIP_CODES.some(p => (wx.repr || wx.value || '').toUpperCase().includes(p)));
}

function rwyAvailable(hw, xwAbs, wet) {
    if (hw < -MAX_TAILWIND) return false;
    return xwAbs <= (wet ? MAX_XW_WET : MAX_XW_DRY);
}

function autoPropose(icao) {
    const st = aptState[icao];
    if (!st) return;
    const aptCfg = configsByApt[icao];
    const vmc = (st.rules === 'VFR' || st.rules === 'MVFR');

    // Reset all to off
    for (const r of Object.values(st.runways)) r.role = 'off';

    if (aptCfg && aptCfg.configs) {
        // Find best config
        let best = null, bestRate = 0, bestHw = -999;
        for (const cfg of aptCfg.configs) {
            if (cfg.requires) {
                if (cfg.requires.dry && st.wet) continue;
                if (cfg.requires.vmc && !vmc) continue;
            }
            const arrRwy = st.runways[cfg.primary_arr];
            if (!arrRwy || !arrRwy.avail) continue;
            if (cfg.primary_dep !== cfg.primary_arr) {
                const depRwy = st.runways[cfg.primary_dep];
                if (!depRwy || !depRwy.avail) continue;
            }
            const rate = cfg.declared_arr_rate || 0;
            const hw = arrRwy.hw;
            if (rate > bestRate || (rate === bestRate && hw > bestHw)) {
                bestRate = rate; bestHw = hw; best = cfg;
            }
        }
        if (best) {
            for (const [ident, info] of Object.entries(best.runways)) {
                if (st.runways[ident]) st.runways[ident].role = info.role;
            }
            st.configName = best.label;
            return;
        }
    }

    // Fallback: best headwind runway as A/D
    let bestRwy = null, bestHw2 = -999;
    for (const [ident, r] of Object.entries(st.runways)) {
        if (r.avail && r.hw > bestHw2) { bestHw2 = r.hw; bestRwy = ident; }
    }
    if (bestRwy) {
        st.runways[bestRwy].role = 'A/D';
        st.configName = `${bestRwy} (auto)`;
    }
}

function renderCard(icao) {
    const st = aptState[icao];
    if (!st) return '<div class="apt-card"><span class="apt-icao">' + icao + '</span> No data</div>';

    const wxClass = { VFR: 'wx-vfr', MVFR: 'wx-mvfr', IFR: 'wx-ifr', LIFR: 'wx-lifr' }[st.rules] || '';
    const wxCond = (st.rules === 'VFR' || st.rules === 'MVFR') ? 'VMC' : 'IMC';
    const lahso = !st.wet && (st.rules === 'VFR' || st.rules === 'MVFR');
    const xwLimit = st.wet ? MAX_XW_WET : MAX_XW_DRY;

    // Runway chips
    const rwySorted = Object.entries(st.runways).sort((a, b) => a[1].hdg - b[1].hdg);
    const chips = rwySorted.map(([ident, r]) => {
        const roleClass = r.role === 'A' ? 'role-A' : r.role === 'D' ? 'role-D' : r.role === 'A/D' ? 'role-AD' : 'role-off';
        const unavail = !r.avail ? 'unavail' : '';
        const hwStr = r.hw >= 0 ? `+${r.hw}` : `${r.hw}`;
        const roleLabel = r.role === 'off' ? '—' : r.role;
        const tooltip = r.avail
            ? `${ident} ${r.hdg}° | HW ${hwStr}kt XW ${r.xwAbs}kt${r.xw > 0 ? 'R' : 'L'} | Click to toggle`
            : `${ident} UNAVAILABLE: ${r.unavailReason}`;
        return `<div class="rwy-chip ${roleClass} ${unavail}" title="${tooltip}" data-icao="${icao}" data-rwy="${ident}" onclick="toggleRwy('${icao}','${ident}')">
            <span class="rwy-id">${ident}</span>
            <span class="rwy-role">${roleLabel}</span>
            <span class="rwy-wind">${hwStr} | ${r.xwAbs}${r.xw > 0 ? 'R' : 'L'}</span>
        </div>`;
    }).join('');

    // Count active arr/dep runways
    const arrRwys = rwySorted.filter(([, r]) => r.role === 'A' || r.role === 'A/D');
    const depRwys = rwySorted.filter(([, r]) => r.role === 'D' || r.role === 'A/D');

    // Get best headwind from active arrival runways for AAR calc
    const bestArrHw = arrRwys.length > 0 ? Math.max(...arrRwys.map(([, r]) => r.hw)) : 0;

    return `
        <div class="apt-header">
            <span class="apt-icao">${icao}</span>
            <span class="badge ${wxClass}">${st.rules}</span>
            <span class="badge" style="background:var(--bg);border:1px solid var(--border);color:var(--text-dim)">${wxCond}</span>
            <span class="badge ${st.wet ? 'badge-wet' : 'badge-dry'}">${st.wet ? 'WET' : 'DRY'}</span>
            ${lahso ? '<span class="badge badge-lahso">LAHSO</span>' : '<span class="badge badge-nolahso">no LAHSO</span>'}
            <button class="propose-btn" onclick="propose('${icao}')">Auto</button>
        </div>
        <div class="wind-line">Wind <span class="val">${st.windDir}°/${st.windSpd}kt</span>${st.gustSpd > st.windSpd ? ` G${st.gustSpd}` : ''} | XW lim ${xwLimit}kt | ${st.configName || ''}</div>
        <div class="rwy-grid">${chips}</div>
        <div class="rate-box" id="rates-${icao}">
            <div class="rate-item rate-arr"><div class="rate-num" id="aar-${icao}">—</div><div class="rate-label">AAR</div></div>
            <div class="rate-item rate-dep"><div class="rate-num" id="adr-${icao}">—</div><div class="rate-label">ADR</div></div>
            <div class="rate-item rate-total"><div class="rate-num" id="total-${icao}">—</div><div class="rate-label">Total</div></div>
            <div class="rate-sub" id="rate-detail-${icao}"></div>
        </div>
        <div class="metar-raw">${st.metar || ''}</div>
    `;
}

function toggleRwy(icao, ident) {
    const st = aptState[icao];
    if (!st || !st.runways[ident]) return;
    const r = st.runways[ident];
    if (!r.avail) return; // can't activate unavailable runway

    const idx = ROLE_CYCLE.indexOf(r.role);
    r.role = ROLE_CYCLE[(idx + 1) % ROLE_CYCLE.length];
    st.configName = 'Manual';

    refreshCard(icao);
}

function propose(icao) {
    autoPropose(icao);
    refreshCard(icao);
}

function refreshCard(icao) {
    const card = document.querySelector(`[data-card="${icao}"]`);
    if (card) {
        card.innerHTML = renderCard(icao);
        computeRates(icao);
    }
}

async function computeRates(icao) {
    const st = aptState[icao];
    if (!st) return;

    const arrRwys = Object.entries(st.runways).filter(([, r]) => r.role === 'A' || r.role === 'A/D');
    const depRwys = Object.entries(st.runways).filter(([, r]) => r.role === 'D' || r.role === 'A/D');

    if (arrRwys.length === 0 && depRwys.length === 0) {
        document.getElementById(`aar-${icao}`).textContent = '—';
        document.getElementById(`adr-${icao}`).textContent = '—';
        document.getElementById(`total-${icao}`).textContent = '—';
        document.getElementById(`rate-detail-${icao}`).textContent = 'No active runways';
        return;
    }

    // For each arrival runway, compute AAR from fleet mix + headwind
    let totalArr = 0;
    let arrDetails = [];
    for (const [ident, r] of arrRwys) {
        try {
            const res = await fetch(`/api/v1/aar/calculate?airport=${icao}&headwind=${r.hw}`);
            const d = await res.json();
            // If this runway is also A/D (shared), halve the arrival rate
            const shared = r.role === 'A/D';
            const rate = shared ? Math.round(d.aar * 0.6) : d.aar; // ~60% arrivals on shared
            totalArr += rate;
            arrDetails.push(`${ident}: ${rate}`);
        } catch (e) {
            arrDetails.push(`${ident}: err`);
        }
    }

    // Departure rate: dedicated dep runways get full rate estimate,
    // shared A/D runways get remainder
    let totalDep = 0;
    let depDetails = [];
    for (const [ident, r] of depRwys) {
        if (r.role === 'D') {
            // Dedicated departure runway — estimate ~20/hr (typ single runway dep rate)
            totalDep += 20;
            depDetails.push(`${ident}: 20`);
        } else {
            // A/D shared — remainder after arrivals
            const shared = Math.round(totalArr * 0.4 / 0.6); // inverse of the 60/40 split
            totalDep += Math.min(shared, 12);
            depDetails.push(`${ident}: ${Math.min(shared, 12)}`);
        }
    }

    const el = (id, txt) => { const e = document.getElementById(id); if (e) e.textContent = txt; };
    el(`aar-${icao}`, `${totalArr}/hr`);
    el(`adr-${icao}`, `${totalDep}/hr`);
    el(`total-${icao}`, `${totalArr + totalDep}/hr`);
    el(`rate-detail-${icao}`, `ARR: ${arrDetails.join(', ')} | DEP: ${depDetails.join(', ')}`);
}

async function loadAll() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div style="color:var(--text-dim);padding:1rem;">Loading...</div>';
    await loadData();

    // Fetch all METARs
    const metarPromises = AIRPORTS.map(async (icao) => {
        try {
            const res = await fetch(`https://avwx.rest/api/metar/${icao}?token=${AVWX_TOKEN}`);
            if (!res.ok) throw new Error('fail');
            return { icao, data: await res.json() };
        } catch (e) {
            return { icao, data: null };
        }
    });
    const metars = await Promise.all(metarPromises);

    // Build state
    for (const { icao, data: m } of metars) {
        if (!m) { aptState[icao] = null; continue; }

        const windDir = parseInt(m.wind_direction?.value || 0);
        const windSpd = parseInt(m.wind_speed?.value || 0);
        const gustSpd = parseInt(m.wind_gust?.value || windSpd);
        const effectiveWind = Math.max(windSpd, gustSpd);
        const wet = isWet(m);
        const rules = m.flight_rules || '?';

        const rwys = {};
        for (const t of (thresholdsByApt[icao] || [])) {
            const wc = windComponents(windDir, effectiveWind, t.hdg);
            const xwAbs = Math.abs(wc.crosswind);
            const xwLimit = wet ? MAX_XW_WET : MAX_XW_DRY;
            const avail = rwyAvailable(wc.headwind, xwAbs, wet);
            // Build reason for unavailability
            let unavailReason = '';
            if (!avail) {
                const reasons = [];
                if (wc.headwind < -MAX_TAILWIND) reasons.push(`Tailwind ${Math.abs(wc.headwind)}kt (max ${MAX_TAILWIND}kt)`);
                if (xwAbs > xwLimit) reasons.push(`Crosswind ${xwAbs}kt (max ${xwLimit}kt${wet ? ' wet' : ''})`);
                unavailReason = reasons.join(', ');
            }
            rwys[t.ident] = {
                hdg: t.hdg,
                hw: wc.headwind,
                xw: wc.crosswind,
                xwAbs,
                avail,
                unavailReason,
                role: 'off'
            };
        }

        aptState[icao] = { windDir, windSpd, gustSpd, effectiveWind: effectiveWind, wet, rules, runways: rwys, metar: m.raw || '', configName: '' };
        autoPropose(icao);
    }

    // Render
    grid.innerHTML = '';
    for (const icao of AIRPORTS) {
        const card = document.createElement('div');
        card.className = 'apt-card';
        card.setAttribute('data-card', icao);
        card.innerHTML = renderCard(icao);
        grid.appendChild(card);
        computeRates(icao);
    }

    document.getElementById('last-update').textContent = `Updated ${new Date().toISOString().substring(11, 16)}Z`;
}

document.getElementById('refresh-btn').addEventListener('click', loadAll);
loadAll();
setInterval(loadAll, 300000);
</script>
</body>
</html>
