<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>atfm-tools — Runway / AAR</title>
    <style>
        :root {
            --bg: #0f1419; --bg-elev: #1a2028; --bg-elev-hi: #242c38;
            --border: #2a3340;
            --text: #d7dee8; --text-dim: #8a94a3; --text-bright: #f0f4fa;
            --accent: #5eead4; --accent-dim: #2a6b5f;
            --warn: #facc15; --warn-dim: #5e4a0f;
            --alert: #f87171; --alert-dim: #5e1f1f;
            --ok: #4ade80; --ok-dim: #1e4a2e;
            --info: #60a5fa;
            --mono: "SF Mono", Consolas, Monaco, monospace;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; }
        a { color: var(--accent); text-decoration: none; }
        .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

        header { position: sticky; top: 0; z-index: 100; background: var(--bg-elev); border-bottom: 1px solid var(--border); padding: 0.65rem 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        header h1 { margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-bright); }
        header .nav-pills { display: flex; gap: 0.5rem; margin-left: auto; }
        .pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: var(--bg-elev-hi); border: 1px solid var(--border); font-size: 0.75rem; color: var(--text-dim); }

        main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        .airport-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .apt-card {
            background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 1rem;
        }
        .apt-card .apt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .apt-card .apt-icao { font-size: 1.2rem; font-weight: 700; color: var(--text-bright); font-family: var(--mono); }
        .apt-card .wx-badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 3px; font-weight: 600; }
        .wx-vfr { background: var(--ok-dim); color: var(--ok); }
        .wx-mvfr { background: #1e3a5f; color: var(--info); }
        .wx-ifr { background: var(--alert-dim); color: var(--alert); }
        .wx-lifr { background: #5e1f3f; color: #f472b6; }
        .apt-card .wind-line { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.6rem; }
        .apt-card .wind-line .wind-val { color: var(--text-bright); font-family: var(--mono); }

        .rwy-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-bottom: 0.5rem; }
        .rwy-table th { text-align: left; padding: 0.2rem 0.4rem; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
        .rwy-table td { padding: 0.2rem 0.4rem; font-family: var(--mono); }
        .rwy-table .best td { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
        .hw-val { color: var(--ok); }
        .tw-val { color: var(--alert); }
        .xw-ok { color: var(--text-dim); }
        .xw-warn { color: var(--warn); }
        .xw-bad { color: var(--alert); }

        .aar-line { font-size: 0.85rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
        .aar-num { font-size: 1.4rem; font-weight: 700; color: var(--accent); font-family: var(--mono); }
        .aar-sub { font-size: 0.7rem; color: var(--text-dim); }

        .metar-raw { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.4rem; word-break: break-all; cursor: pointer; }
        .metar-raw:hover { color: var(--text); }

        .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        button.refresh { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; font-weight: 600; }
        button.refresh:hover { background: var(--accent); color: var(--bg); }
        .last-update { font-size: 0.75rem; color: var(--text-dim); }
    </style>
</head>
<body>
<header>
    <h1>atfm-tools <span style="color:var(--text-dim)">Runway / AAR</span></h1>
    <div class="nav-pills">
        <a href="/dashboard.html" class="pill">dashboard</a>
        <a href="/reports.html" class="pill">reports</a>
        <a href="/perti.html" class="pill">perti</a>
        <a href="/map.html" class="pill">map</a>
    </div>
</header>

<main>
    <div class="controls">
        <button class="refresh" id="refresh-btn">Refresh METAR</button>
        <span class="last-update" id="last-update"></span>
    </div>
    <div class="airport-grid" id="grid"></div>
</main>

<script>
const AIRPORTS = ['CYHZ','CYOW','CYUL','CYVR','CYWG','CYYC','CYYZ'];
const AVWX_TOKEN = 'vmtkb1D8Tuva2Jw2tXihWcKE3m2sfDJkySBZygVx82I';

// Thresholds loaded from our API
let thresholdsByApt = {};

async function loadThresholds() {
    const res = await fetch('/api/v1/debug/runway-thresholds');
    const data = await res.json();
    for (const t of data) {
        const apt = t.airport_icao;
        if (!thresholdsByApt[apt]) thresholdsByApt[apt] = [];
        thresholdsByApt[apt].push({ ident: t.runway_ident, hdg: t.heading_deg });
    }
}

function windComponents(windDir, windSpd, rwyHdg) {
    const angle = ((windDir - rwyHdg + 360) % 360) * Math.PI / 180;
    return {
        headwind: Math.round(windSpd * Math.cos(angle)),
        crosswind: Math.round(windSpd * Math.sin(angle))
    };
}

async function fetchMetarAndRender(icao) {
    const card = document.createElement('div');
    card.className = 'apt-card';

    try {
        const res = await fetch(`https://avwx.rest/api/metar/${icao}?token=${AVWX_TOKEN}`);
        if (!res.ok) throw new Error('METAR fetch failed');
        const m = await res.json();

        const windDir = parseInt(m.wind_direction?.value || 0);
        const windSpd = parseInt(m.wind_speed?.value || 0);
        const gustSpd = parseInt(m.wind_gust?.value || windSpd);
        const effectiveWind = Math.max(windSpd, gustSpd);
        const rules = m.flight_rules || '?';
        const metar = m.raw || '';

        // Weather badge
        const wxClass = { VFR: 'wx-vfr', MVFR: 'wx-mvfr', IFR: 'wx-ifr', LIFR: 'wx-lifr' }[rules] || '';
        // Determine VMC/LIMC/IMC from flight rules
        const wxCondition = (rules === 'VFR' || rules === 'MVFR') ? 'VMC' : (rules === 'IFR' ? 'IMC' : 'LIMC');

        // Compute wind components for each runway
        const rwys = thresholdsByApt[icao] || [];
        const rwyData = rwys.map(r => {
            const wc = windComponents(windDir, effectiveWind, r.hdg);
            return { ...r, ...wc, xwAbs: Math.abs(wc.crosswind) };
        });

        // Sort by headwind descending (best first)
        rwyData.sort((a, b) => b.headwind - a.headwind);
        const bestRwy = rwyData[0]?.ident || '?';
        const bestHw = rwyData[0]?.headwind || 0;

        // Build runway table
        let rwyHtml = '<table class="rwy-table"><thead><tr><th>Rwy</th><th>Hdg</th><th>HW/TW</th><th>XW</th></tr></thead><tbody>';
        for (const r of rwyData) {
            const isBest = r.ident === bestRwy;
            const hwClass = r.headwind >= 0 ? 'hw-val' : 'tw-val';
            const hwLabel = r.headwind >= 0 ? `+${r.headwind}` : `${r.headwind}`;
            const xwClass = r.xwAbs <= 12 ? 'xw-ok' : r.xwAbs <= 20 ? 'xw-warn' : 'xw-bad';
            const xwDir = r.crosswind > 0 ? 'R' : 'L';
            rwyHtml += `<tr class="${isBest ? 'best' : ''}">
                <td>${r.ident}</td>
                <td>${r.hdg}°</td>
                <td class="${hwClass}">${hwLabel}kt</td>
                <td class="${xwClass}">${r.xwAbs}kt ${xwDir}</td>
            </tr>`;
        }
        rwyHtml += '</tbody></table>';

        // Fetch AAR
        let aarHtml = '';
        try {
            const aarRes = await fetch(`/api/v1/aar/calculate?airport=${icao}&headwind=${bestHw}`);
            const aar = await aarRes.json();
            const windEffect = aar.aar_calm - aar.aar;
            aarHtml = `<div class="aar-line">
                <span class="aar-num">${aar.aar}/hr</span> achievable AAR
                <div class="aar-sub">Calm: ${aar.aar_calm}/hr${windEffect > 0 ? ` | Wind: -${windEffect}/hr` : ''} | Gap: ${aar.avg_gap_sec}s | Mix: ${aar.mix_source}</div>
            </div>`;
        } catch (e) {
            aarHtml = '<div class="aar-sub">AAR unavailable</div>';
        }

        card.innerHTML = `
            <div class="apt-header">
                <span class="apt-icao">${icao}</span>
                <span class="wx-badge ${wxClass}">${rules}</span>
                <span class="wx-badge" style="background:var(--bg);border:1px solid var(--border);color:var(--text-dim)">${wxCondition}</span>
            </div>
            <div class="wind-line">Wind <span class="wind-val">${windDir}°/${effectiveWind}kt</span>${gustSpd > windSpd ? ` G${gustSpd}` : ''} → Best <span class="wind-val">${bestRwy}</span></div>
            ${rwyHtml}
            ${aarHtml}
            <div class="metar-raw" title="Click to expand">${metar}</div>
        `;
    } catch (err) {
        card.innerHTML = `<div class="apt-header"><span class="apt-icao">${icao}</span></div><div style="color:var(--alert);padding:0.5rem 0">${err.message}</div>`;
    }

    return card;
}

async function loadAll() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div style="color:var(--text-dim);padding:1rem;">Loading METARs...</div>';

    await loadThresholds();

    const cards = await Promise.all(AIRPORTS.map(fetchMetarAndRender));
    grid.innerHTML = '';
    cards.forEach(c => grid.appendChild(c));

    document.getElementById('last-update').textContent = `Updated ${new Date().toISOString().substring(11, 16)}Z`;
}

document.getElementById('refresh-btn').addEventListener('click', loadAll);

loadAll();
setInterval(loadAll, 300000); // refresh every 5 min
</script>
</body>
</html>
