<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>26E Sector Load — CZQM / CZQX</title>
<style>
:root {
    --bg: #0a0e1a;
    --bg-elev: #121826;
    --bg-elev-hi: #1a2133;
    --text: #e8ecf4;
    --text-dim: #7a8499;
    --border: #2a3142;
    --accent: #5ee0ba;
    --accent-dim: rgba(94, 224, 186, 0.12);
    --warn: #f5a05b;
    --alert: #ef6464;
    --mono: "SF Mono", "JetBrains Mono", Consolas, monospace;
}
* { box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 1rem;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 14px;
}
h1 {
    font-size: 1.1rem;
    font-weight: 500;
    margin: 0 0 0.5rem 0;
}
.meta {
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 0.75rem;
}
.meta span.hot { color: var(--accent); }
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 0.75rem;
}
.section-header {
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid var(--border);
}
section.group {
    margin-bottom: 0.8rem;
}
.card.pair .name {
    color: var(--warn);
}
.card.pair svg {
    height: 160px;
}
.card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem 0.75rem 0.4rem;
}
.card .title {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.3rem;
}
.card .name {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    font-size: 0.95rem;
}
.card .label {
    color: var(--text-dim);
    font-size: 0.75rem;
    font-family: var(--mono);
}
.card .peak {
    color: var(--warn);
    font-family: var(--mono);
    font-size: 0.75rem;
}
svg {
    display: block;
    width: 100%;
    height: 120px;
    background: var(--bg);
    border-radius: 3px;
}
.axis-label {
    fill: var(--text-dim);
    font-family: var(--mono);
    font-size: 9px;
}
.bar {
    fill: var(--accent);
    opacity: 0.9;
}
.bar:hover {
    fill: var(--warn);
}
.bar.peak {
    fill: var(--warn);
}
.bar-in {
    fill: var(--accent);
    opacity: 0.9;
}
.bar-out {
    fill: #7aa8ff;
    opacity: 0.9;
}
.grid-line {
    stroke: var(--border);
    stroke-dasharray: 2 2;
    stroke-width: 0.5;
}
.controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.75rem;
    font-family: var(--mono);
    font-size: 0.75rem;
}
.controls label { color: var(--text-dim); }
.controls input[type="number"] {
    width: 3em;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.15rem 0.3rem;
    font-family: var(--mono);
    font-size: 0.75rem;
}
.tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--bg-elev-hi);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.25rem 0.5rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.1s;
}
.cap-line {
    stroke: var(--alert);
    stroke-dasharray: 4 2;
    stroke-width: 1;
}
</style>
</head>
<body>
<h1>26E CTP Sector Load — CZQM / CZQX</h1>
<div class="meta" id="meta">Loading…</div>
<div class="controls">
    <label>View:</label>
    <select id="viewMode">
        <option value="occupancy" selected>Occupancy</option>
        <option value="workload">Workload (in/out events)</option>
    </select>
    <label>Capacity threshold:</label>
    <input type="number" id="capThreshold" value="55" min="0" step="1"/>
    <label>Bin:</label>
    <span id="binInfo">—</span>
    <label>Metric:</label>
    <span id="metricInfo">—</span>
</div>
<div id="groups"></div>
<div class="tooltip" id="tip"></div>

<script>
const TIP = document.getElementById('tip');
let DATA = null;
let CAP = 55;

async function load() {
    const r = await fetch('/26e-sector-load.json');
    DATA = await r.json();
    const m = DATA.meta;
    const windInfo = m.wind_source
        ? `${m.wind_source} @ ${m.wind_event_hour_utc?.slice(11,13) || '?'}Z`
        : 'no wind';
    document.getElementById('meta').innerHTML =
        `<span class="hot">${m.flights_touching_sector}</span> of ${m.flights_total} flights transit these sectors · ` +
        `cruise M${m.cruise_mach || '?'} · winds ${windInfo} · ` +
        `bin ${m.bin_minutes}m · ` +
        `generated ${m.generated_utc.slice(0, 16).replace('T', ' ')}Z`;
    document.getElementById('binInfo').textContent = `${m.bin_minutes}m`;
    document.getElementById('metricInfo').textContent =
        m.metric === 'instantaneous_occupancy_peak_in_bin'
            ? 'peak-instantaneous occupancy'
            : (m.metric || '—');
    render();
}

// Layout groups — the 1s, 2s, 3s, 4s, then north
// Each group = a header + a row of cards: [pair?, ...individuals]
const GROUPS = [
    {title: '1 · QM1 feeds QX1',  pair: 'QM1+QX1', sectors: ['QM1', 'QX1']},
    {title: '2 · QM2 feeds QX2',  pair: 'QM2+QX2', sectors: ['QM2', 'QX2']},
    {title: '3 · QM3 feeds QX3',  pair: 'QM3+QX3', sectors: ['QM3', 'QX3']},
    {title: '4 · QM4 feeds QX4',  pair: 'QM4+QX4', sectors: ['QM4', 'QX4']},
    {title: 'North · QX5 / QX6+QX7', pair: 'QX6+QX7', sectors: ['QX5', 'QX6', 'QX7']},
];

function render() {
    const root = document.getElementById('groups');
    root.innerHTML = '';

    const allBins = new Set();
    for (const sid in DATA.load) {
        for (const p of DATA.load[sid]) allBins.add(p.bin_minute);
    }
    for (const pid in (DATA.pair_load || {})) {
        for (const p of DATA.pair_load[pid]) allBins.add(p.bin_minute);
    }
    const sortedBins = [...allBins].sort((a, b) => a - b);
    const minBin = sortedBins[0] || 600;
    const maxBin = sortedBins[sortedBins.length - 1] || 960;
    const xMin = Math.floor(minBin / 60) * 60;
    const xMax = Math.ceil((maxBin + DATA.meta.bin_minutes) / 60) * 60;

    // Y scales per view mode.
    const MODE = document.getElementById('viewMode').value;   // 'occupancy' | 'workload'
    const YMAX_OCC_SECTOR = 60;
    const YMAX_OCC_PAIR   = 100;   // QM1+QX1 hits ~88, keep headroom
    const YMAX_OCC_PAIR_BY_ID = {'QX6+QX7': 60};
    const YMAX_WL_SECTOR  = 20;    // events per 5m bin
    const YMAX_WL_PAIR    = 25;

    const sectorById = Object.fromEntries(DATA.sectors.map(s => [s.id, s]));
    const pairById = Object.fromEntries((DATA.pairs || []).map(p => [p.id, p]));

    // Row -> max value (counts both 'count' and in+out for events)
    const rowMax = r => r.count !== undefined ? r.count : (r.in || 0) + (r.out || 0);
    const peakLabel = (rows) => {
        if (!rows.length) return '(no flights)';
        const p = rows.reduce((a, r) => rowMax(r) > rowMax(a) ? r : a);
        const hh = String(Math.floor(p.bin_minute / 60)).padStart(2, '0');
        const mm = String(p.bin_minute % 60).padStart(2, '0');
        const v = rowMax(p);
        return `peak ${v} @ ${hh}${mm}Z`;
    };

    const isWL = MODE === 'workload';
    const sectorLoad = isWL ? (DATA.events || {})       : DATA.load;
    const pairLoad   = isWL ? (DATA.pair_events || {})  : DATA.pair_load;
    const sectorYMax = isWL ? YMAX_WL_SECTOR : YMAX_OCC_SECTOR;
    const pairYMaxFor = (pid) => isWL
        ? YMAX_WL_PAIR
        : (YMAX_OCC_PAIR_BY_ID[pid] || YMAX_OCC_PAIR);
    const labelSuffix = isWL ? 'workload events' : 'occupancy';

    const toRender = [];

    for (const g of GROUPS) {
        const section = document.createElement('section');
        section.className = 'group';
        const header = document.createElement('div');
        header.className = 'section-header';
        header.textContent = g.title;
        section.appendChild(header);

        const gridEl = document.createElement('div');
        gridEl.className = 'grid';
        section.appendChild(gridEl);

        // Pair card first (if present)
        if (g.pair && pairById[g.pair]) {
            const p = pairById[g.pair];
            const loadRows = pairLoad[p.id] || [];
            const card = document.createElement('div');
            card.className = 'card pair';
            card.innerHTML = `
                <div class="title">
                    <span class="name">${p.label}</span>
                    <span class="label">combined ${labelSuffix}</span>
                    <span class="peak">${peakLabel(loadRows)}</span>
                </div>
                <svg viewBox="0 0 400 160" preserveAspectRatio="none" id="svg-${p.id}"></svg>
            `;
            gridEl.appendChild(card);
            toRender.push([p.id, loadRows, {height: 160, yMax: pairYMaxFor(p.id), stacked: isWL}]);
        }

        // Then individual member cards
        for (const sid of g.sectors) {
            const s = sectorById[sid];
            if (!s) continue;
            const loadRows = sectorLoad[s.id] || [];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="title">
                    <span class="name">${s.id}</span>
                    <span class="label">${s.freq || ''} MHz</span>
                    <span class="peak">${peakLabel(loadRows)}</span>
                </div>
                <svg viewBox="0 0 400 120" preserveAspectRatio="none" id="svg-${s.id}"></svg>
            `;
            gridEl.appendChild(card);
            toRender.push([s.id, loadRows, {height: 120, yMax: sectorYMax, stacked: isWL}]);
        }

        root.appendChild(section);
    }

    // Draw all the charts after DOM attachment
    for (const [id, rows, opts] of toRender) {
        drawChart(id, rows, xMin, xMax, opts);
    }
}

function drawChart(sectorId, rows, xMin, xMax, opts) {
    const svg = document.getElementById(`svg-${sectorId}`);
    const W = 400, H = (opts && opts.height) || 120;
    const M = {l: 28, r: 6, t: 8, b: 18};
    const plotW = W - M.l - M.r;
    const plotH = H - M.t - M.b;
    const bin = DATA.meta.bin_minutes;
    const stacked = !!(opts && opts.stacked);

    const rowVal = r => r.count !== undefined ? r.count : (r.in || 0) + (r.out || 0);
    const maxCount = (opts && opts.yMax)
        ? opts.yMax
        : Math.max(CAP, ...rows.map(rowVal), 10);
    const xScale = (t) => M.l + (t - xMin) / (xMax - xMin) * plotW;
    const yScale = (v) => M.t + plotH - (v / maxCount) * plotH;

    let svgHtml = '';
    for (let t = xMin; t <= xMax; t += 60) {
        const x = xScale(t);
        svgHtml += `<line class="grid-line" x1="${x}" y1="${M.t}" x2="${x}" y2="${M.t + plotH}"/>`;
        const hh = Math.floor(t / 60);
        svgHtml += `<text class="axis-label" x="${x}" y="${H - 4}" text-anchor="middle">${String(hh).padStart(2,'0')}Z</text>`;
    }
    const tickStep = Math.max(1, Math.ceil(maxCount / 4));
    for (let v = 0; v <= maxCount; v += tickStep) {
        const y = yScale(v);
        svgHtml += `<line class="grid-line" x1="${M.l}" y1="${y}" x2="${M.l + plotW}" y2="${y}"/>`;
        svgHtml += `<text class="axis-label" x="${M.l - 3}" y="${y + 3}" text-anchor="end">${v}</text>`;
    }
    // Capacity threshold only in occupancy mode (workload has no single "cap")
    if (!stacked && CAP > 0 && CAP <= maxCount) {
        const y = yScale(CAP);
        svgHtml += `<line class="cap-line" x1="${M.l}" y1="${y}" x2="${M.l + plotW}" y2="${y}"/>`;
    }
    const binPx = (plotW / (xMax - xMin)) * bin;
    const peakCount = rows.length ? Math.max(...rows.map(rowVal)) : 0;
    for (const r of rows) {
        const x = xScale(r.bin_minute);
        const total = rowVal(r);
        if (stacked) {
            // IN bar from baseline, then OUT bar stacked above
            const inV = r.in || 0;
            const outV = r.out || 0;
            if (inV > 0) {
                const y = yScale(inV);
                const h = plotH + M.t - y;
                svgHtml += `<rect class="bar bar-in" x="${x}" y="${y}" width="${binPx - 0.5}" height="${h}" data-in="${inV}" data-out="${outV}" data-bin="${r.bin_minute}"/>`;
            }
            if (outV > 0) {
                const yTop = yScale(inV + outV);
                const yBottom = yScale(inV);
                svgHtml += `<rect class="bar bar-out" x="${x}" y="${yTop}" width="${binPx - 0.5}" height="${yBottom - yTop}" data-in="${inV}" data-out="${outV}" data-bin="${r.bin_minute}"/>`;
            }
        } else {
            const y = yScale(total);
            const h = plotH + M.t - y;
            const cls = total === peakCount ? 'bar peak' : 'bar';
            svgHtml += `<rect class="${cls}" x="${x}" y="${y}" width="${binPx - 0.5}" height="${h}" data-count="${total}" data-bin="${r.bin_minute}"/>`;
        }
    }
    svg.innerHTML = svgHtml;

    svg.addEventListener('mousemove', (e) => {
        if (e.target.tagName === 'rect') {
            const rect = e.target;
            const b = parseInt(rect.getAttribute('data-bin'));
            const hh = Math.floor(b / 60);
            const mm = b % 60;
            if (stacked) {
                TIP.textContent = `${String(hh).padStart(2,'0')}${String(mm).padStart(2,'0')}Z  in ${rect.getAttribute('data-in')} · out ${rect.getAttribute('data-out')}`;
            } else {
                TIP.textContent = `${String(hh).padStart(2,'0')}${String(mm).padStart(2,'0')}Z  ${rect.getAttribute('data-count')} flt`;
            }
            TIP.style.left = (e.clientX + 10) + 'px';
            TIP.style.top = (e.clientY + 10) + 'px';
            TIP.style.opacity = '1';
        } else {
            TIP.style.opacity = '0';
        }
    });
    svg.addEventListener('mouseleave', () => TIP.style.opacity = '0');
}

document.getElementById('capThreshold').addEventListener('change', (e) => {
    CAP = parseInt(e.target.value) || 0;
    render();
});
document.getElementById('viewMode').addEventListener('change', () => render());

load();
</script>
</body>
</html>
