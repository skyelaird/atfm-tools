<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>26E CTP Sector Load — D-2 forecast lens (σ=6.5m)</title>
<style>
:root {
    --bg: #0a0e1a;
    --bg-elev: #121826;
    --bg-elev-hi: #1a2133;
    --text: #e8ecf4;
    --text-dim: #7a8499;
    --border: #2a3142;
    --accent: #5ee0ba;
    --accent-dim: rgba(94, 224, 186, 0.18);
    --warn: #f5a05b;
    --alert: #ef6464;
    --mono: "SF Mono","JetBrains Mono",Consolas,monospace;
}
* { box-sizing: border-box; }
body {
    background: var(--bg); color: var(--text);
    margin: 0; padding: 1rem;
    font-family: -apple-system, system-ui, sans-serif; font-size: 14px;
}
h1 { font-size: 1.1rem; font-weight: 500; margin: 0 0 0.4rem; }
h1 .lead { color: var(--warn); font-family: var(--mono); }
.sub {
    font-family: var(--mono); color: var(--text-dim);
    font-size: 0.8rem; margin-bottom: 0.8rem;
}
.sub a { color: var(--accent); text-decoration: none; }
.sub a:hover { text-decoration: underline; }

.lens-nav {
    display: inline-flex; gap: 0.4rem; margin-left: 0.5rem;
    font-family: var(--mono); font-size: 0.75rem;
}
.lens-nav a {
    padding: 0.15rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    text-decoration: none;
}
.lens-nav a.active { border-color: var(--warn); color: var(--warn); }
.lens-nav a:hover { color: var(--accent); border-color: var(--accent); }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 0.75rem;
}
.section-header {
    font-family: var(--mono); color: var(--text-dim);
    font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase;
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid var(--border);
}
section.group { margin-bottom: 0.8rem; }

.card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem 0.75rem 0.4rem;
}
.card .title {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 0.3rem;
}
.card .name {
    font-family: var(--mono); font-weight: 600; color: var(--accent);
    font-size: 0.95rem;
}
.card.pair .name { color: var(--warn); }
.card.pair svg { height: 160px; }
.card .label { color: var(--text-dim); font-size: 0.75rem; font-family: var(--mono); }
.card .peak { color: var(--warn); font-family: var(--mono); font-size: 0.75rem; }

svg {
    display: block; width: 100%; height: 120px;
    background: var(--bg); border-radius: 3px;
}
.axis-label { fill: var(--text-dim); font-family: var(--mono); font-size: 9px; }
.grid-line { stroke: var(--border); stroke-dasharray: 2 2; stroke-width: 0.5; }
.cap-line { stroke: var(--alert); stroke-dasharray: 4 2; stroke-width: 1; }
.line-nominal { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; }
.line-high    { fill: none; stroke: #7aa8ff; stroke-width: 1.5; stroke-linejoin: round; stroke-opacity: 0.9; stroke-dasharray: 4 2; }
.line-low     { fill: none; stroke: var(--warn); stroke-width: 1.5; stroke-linejoin: round; stroke-opacity: 0.9; stroke-dasharray: 4 2; }
.legend-line {
    display: inline-block;
    width: 18px; height: 0;
    border-top: 2px solid;
    vertical-align: middle;
    margin: 0 0.2rem 0 0.5rem;
}
.legend-line.high    { border-top-color: #7aa8ff; border-top-style: dashed; }
.legend-line.nominal { border-top-color: var(--accent); }
.legend-line.low     { border-top-color: var(--warn); border-top-style: dashed; }

.tooltip {
    position: absolute; pointer-events: none;
    background: var(--bg-elev-hi); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 0.25rem 0.5rem;
    font-family: var(--mono); font-size: 0.75rem;
    opacity: 0; transition: opacity 0.1s; z-index: 10;
}
</style>
</head>
<body>
<h1>26E CTP Sector Load — <span class="lead">D-2 forecast lens (σ_ETA = 6.5 min)</span></h1>
<div class="sub" id="meta">Loading…</div>
<div class="sub">
    <span class="legend-line high"></span>faster (+12 kt) ·
    <span class="legend-line nominal"></span>nominal ·
    <span class="legend-line low"></span>slower (−12 kt)
    &nbsp;— each booked flight perturbed by ±12 kt for the whole route, replayed independently.
    <span class="lens-nav">
        <a href="/26e-index.html" style="color:var(--text-dim);">↩ 26E hub</a>
        <a href="/26e-1.html" class="lens-2-1">D-1</a>
        <a href="/26e-2.html" class="lens-2-2">D-2</a>
        <a href="/26e-3.html" class="lens-2-3">D-3</a>
        <a href="/26e-arrival.html" style="color:var(--text-dim);">arrival demand →</a>
        <a href="/26e.html" style="color:var(--text-dim);">raw bars →</a>
    </span>
</div>
<div id="groups"></div>
<div class="tooltip" id="tip"></div>

<script>
// Wind uncertainty σ for this lead time, in minutes of ETA shift.
// Derived from current corpus (5-day NAT-corridor 250mb RMSE):
//   T+24 (D-1) RMS 8.4 kt  → ~4.4 min ETA shift on 4h NAT crossing
//   T+48 (D-2) RMS ~12 kt  → ~6.5 min (interpolated)
//   T+72 (D-3) RMS 17.4 kt → ~9.1 min ETA shift
const SIGMA_MIN = 6.5;
const LEAD_DAYS = 2;

const TIP = document.getElementById('tip');
let DATA = null;
const CAP = 55;

async function load() {
    const r = await fetch('/26e-sector-load.json');
    DATA = await r.json();
    const m = DATA.meta;
    document.querySelector(`.lens-${LEAD_DAYS}-${LEAD_DAYS}`)?.classList.add('active');
    // Per-flight Monte Carlo via VELOCITY perturbation.
    //
    // Each booked flight is replayed at three speeds: nominal, +X kt
    // faster, -X kt slower (where X = grid wind RMSE at this lead).
    // The whole flight is perturbed uniformly — which means entry and
    // exit times for each sector shift PROPORTIONALLY TO THEIR DISTANCE
    // from the origin:
    //
    //   shift_at_point_P = -t_to_P × X / GS    (faster: arrives sooner)
    //
    // So a 4h-flight crossing a sector at hour 3.5 gets a bigger entry
    // shift than at hour 1.5.  Sector dwell stretches/shrinks too:
    //   new_dwell = nominal_dwell × (1 -+ X/GS)
    //
    // Not a CTOT block-shift — every interval boundary shifts by its
    // own amount based on how far into the flight it occurs.
    const SIGMA_GRID_KT = 12;
    const GS_KT = 460;
    function ctotToSec(s) {
        const parts = s.split(':');
        return parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60;
    }

    const BIN_MIN = DATA.meta.bin_minutes;
    const BIN_SEC = BIN_MIN * 60;

    const acc = { load: {}, load_low: {}, load_high: {},
                  pair_load: {}, pair_load_low: {}, pair_load_high: {} };
    for (const s of DATA.sectors) {
        acc.load[s.id] = {}; acc.load_low[s.id] = {}; acc.load_high[s.id] = {};
    }
    for (const p of (DATA.pairs || [])) {
        acc.pair_load[p.id] = {}; acc.pair_load_low[p.id] = {}; acc.pair_load_high[p.id] = {};
    }

    let totalFlights = 0, totalShiftAtFirstEntry = 0;
    // Three velocity perturbations: -X (slower → arrives later),
    // 0 (nominal), +X (faster → arrives sooner).
    const velPerturbs = [-SIGMA_GRID_KT, 0, +SIGMA_GRID_KT];
    const targetKeys = ['load_low', 'load', 'load_high'];
    const pairTargetKeys = ['pair_load_low', 'pair_load', 'pair_load_high'];

    for (const fr of (DATA.flights || [])) {
        const sectorIds = Object.keys(fr.sectors || {});
        if (!sectorIds.length) continue;
        const ctotSec = ctotToSec(fr.ctot);
        let firstEntry = Infinity;
        for (const sid of sectorIds) {
            for (const iv of fr.sectors[sid]) {
                if (iv[0] < firstEntry) firstEntry = iv[0];
            }
        }
        totalFlights++;
        // Mean shift size to first sector entry, for the meta line
        const tFirstHr = (firstEntry - ctotSec) / 3600;
        totalShiftAtFirstEntry += tFirstHr * SIGMA_GRID_KT / GS_KT * 60;  // in minutes

        for (let k = 0; k < 3; k++) {
            const X = velPerturbs[k];   // velocity offset, kt
            // Time-shift factor: at point P with t_to_P, shift = -t_to_P × X / GS
            // Negative because +X (faster) means arrives EARLIER.
            const factor = -X / GS_KT;
            const tgt = acc[targetKeys[k]];
            const ptgt = acc[pairTargetKeys[k]];

            const sectorBins = {};
            for (const sid of sectorIds) {
                sectorBins[sid] = new Set();
                for (const iv of fr.sectors[sid]) {
                    const start = iv[0], end = iv[1];
                    const tToStart = start - ctotSec;
                    const tToEnd   = end   - ctotSec;
                    const newStart = start + tToStart * factor;
                    const newEnd   = end   + tToEnd   * factor;
                    const startBin = Math.floor(newStart / BIN_SEC) * BIN_MIN;
                    const endBin   = Math.floor(newEnd   / BIN_SEC) * BIN_MIN;
                    for (let b = startBin; b <= endBin; b += BIN_MIN) {
                        sectorBins[sid].add(b);
                    }
                }
            }
            for (const sid of sectorIds) {
                for (const b of sectorBins[sid]) {
                    tgt[sid][b] = (tgt[sid][b] || 0) + 1;
                }
            }
            for (const p of (DATA.pairs || [])) {
                const memberBins = new Set();
                for (const m of p.members) {
                    if (sectorBins[m]) {
                        for (const b of sectorBins[m]) memberBins.add(b);
                    }
                }
                for (const b of memberBins) {
                    ptgt[p.id][b] = (ptgt[p.id][b] || 0) + 1;
                }
            }
        }
    }

    function toRows(byBin) {
        return Object.entries(byBin)
            .map(([b, c]) => ({ bin_minute: parseInt(b), count: c }))
            .sort((a, b) => a.bin_minute - b.bin_minute);
    }
    window._mc = {};
    for (const which of ['load', 'load_low', 'load_high']) {
        window._mc[which] = {};
        for (const sid in acc[which]) window._mc[which][sid] = toRows(acc[which][sid]);
    }
    for (const which of ['pair_load', 'pair_load_low', 'pair_load_high']) {
        window._mc[which] = {};
        for (const pid in acc[which]) window._mc[which][pid] = toRows(acc[which][pid]);
    }
    window._mc.meanShiftMin = totalFlights > 0 ? totalShiftAtFirstEntry / totalFlights : 0;
    window._mc.totalFlights = totalFlights;
    document.getElementById('meta').innerHTML =
        `Booked CTP fleet: <b>${m.flights_touching_sector}</b> of ${m.flights_total} flights through these sectors · ` +
        `cruise M${m.cruise_mach || '0.82'} · bin ${m.bin_minutes}m · ` +
        `velocity perturbation ±12 kt → mean ±${(window._mc?.meanShiftMin ?? 0).toFixed(1)} min shift at sector entry`;
    render();
}

const GROUPS = [
    {title: '1 · QM1 / QX1',  pair: 'QM1+QX1', sectors: ['QM1', 'QX1']},
    {title: '2 · QM2 / QX2',  pair: 'QM2+QX2', sectors: ['QM2', 'QX2']},
    {title: '3 · QM3 / QX3',  pair: 'QM3+QX3', sectors: ['QM3', 'QX3']},
    {title: '4 · QM4 / QX4',  pair: 'QM4+QX4', sectors: ['QM4', 'QX4']},
    {title: 'North · QX5 / QX6+QX7', pair: 'QX6+QX7', sectors: ['QX5', 'QX6', 'QX7']},
];

// Catmull-Rom spline → cubic bezier path. Centripetal feel, no overshoot.
function smoothPath(pts) {
    if (!pts.length) return '';
    if (pts.length === 1) return `M${pts[0][0]},${pts[0][1]}`;
    const p = [pts[0], ...pts, pts[pts.length-1]];
    let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
    for (let i = 1; i < p.length - 2; i++) {
        const p0 = p[i-1], p1 = p[i], p2 = p[i+1], p3 = p[i+2];
        const c1x = p1[0] + (p2[0] - p0[0]) / 6;
        const c1y = p1[1] + (p2[1] - p0[1]) / 6;
        const c2x = p2[0] - (p3[0] - p1[0]) / 6;
        const c2y = p2[1] - (p3[1] - p1[1]) / 6;
        d += ` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
    }
    return d;
}

// Bands sourced from per-flight Monte Carlo aggregates: low (-sigma
// per-flight shift), nominal (0), high (+sigma).
function bandsFor(rows, sigmaMin, sectorOrPairId, isPair) {
    const lowKey = isPair ? 'pair_load_low' : 'load_low';
    const highKey = isPair ? 'pair_load_high' : 'load_high';
    const lowRows = (window._mc?.[lowKey] || {})[sectorOrPairId] || [];
    const highRows = (window._mc?.[highKey] || {})[sectorOrPairId] || [];
    const lowByBin  = Object.fromEntries(lowRows.map(r => [r.bin_minute, r.count]));
    const highByBin = Object.fromEntries(highRows.map(r => [r.bin_minute, r.count]));
    const allBins = new Set([
        ...rows.map(r => r.bin_minute),
        ...lowRows.map(r => r.bin_minute),
        ...highRows.map(r => r.bin_minute),
    ]);
    const sorted = [...allBins].sort((a, b) => a - b);
    return sorted.map(b => {
        const nominalRow = rows.find(r => r.bin_minute === b);
        const c  = nominalRow ? nominalRow.count : 0;
        const lo = lowByBin[b]  ?? 0;
        const hi = highByBin[b] ?? 0;
        return {
            bin_minute: b,
            count: c,
            lo: Math.min(lo, c, hi),
            hi: Math.max(lo, c, hi),
        };
    });
}

function render() {
    const root = document.getElementById('groups');
    root.innerHTML = '';

    const allBins = new Set();
    for (const sid in DATA.load) for (const p of DATA.load[sid]) allBins.add(p.bin_minute);
    for (const pid in (DATA.pair_load || {})) for (const p of DATA.pair_load[pid]) allBins.add(p.bin_minute);
    const sorted = [...allBins].sort((a,b) => a-b);
    const minBin = sorted[0] || 600, maxBin = sorted[sorted.length-1] || 1320;
    const xMin = Math.floor(minBin / 60) * 60;
    const xMax = Math.ceil((maxBin + DATA.meta.bin_minutes) / 60) * 60;

    const YMAX_OCC_SECTOR = 60;
    const YMAX_OCC_PAIR = 100;
    const YMAX_OCC_PAIR_BY_ID = {'QX6+QX7': 60};

    const sectorById = Object.fromEntries(DATA.sectors.map(s => [s.id, s]));
    const pairById = Object.fromEntries((DATA.pairs || []).map(p => [p.id, p]));

    const totalsBySector = {}, totalsByPair = {};
    for (const s of DATA.sectors) totalsBySector[s.id] = 0;
    for (const p of (DATA.pairs || [])) totalsByPair[p.id] = 0;
    for (const fr of (DATA.flights || [])) {
        const secs = new Set(Object.keys(fr.sectors || {}));
        for (const sid of secs) if (sid in totalsBySector) totalsBySector[sid]++;
        for (const p of (DATA.pairs || [])) {
            if (p.members.some(m => secs.has(m))) totalsByPair[p.id]++;
        }
    }

    const peakLabel = rows => {
        if (!rows.length) return '(no flights)';
        const p = rows.reduce((a,r) => (r.count > a.count) ? r : a);
        const hh = String(Math.floor(p.bin_minute/60)).padStart(2,'0');
        const mm = String(p.bin_minute % 60).padStart(2,'0');
        return `peak ${p.count} @ ${hh}${mm}Z`;
    };

    const toRender = [];
    for (const g of GROUPS) {
        const section = document.createElement('section');
        section.className = 'group';
        const header = document.createElement('div');
        header.className = 'section-header';
        header.textContent = g.title;
        section.appendChild(header);
        const gridEl = document.createElement('div');
        gridEl.className = 'grid';
        section.appendChild(gridEl);

        if (g.pair && pairById[g.pair]) {
            const p = pairById[g.pair];
            const rows = DATA.pair_load[p.id] || [];
            const card = document.createElement('div');
            card.className = 'card pair';
            card.innerHTML = `
                <div class="title">
                    <span class="name">${p.label}</span>
                    <span class="label">D-${LEAD_DAYS} MC bands</span>
                    <span class="peak">${peakLabel(rows)} · ${totalsByPair[p.id]||0} flt</span>
                </div>
                <svg viewBox="0 0 400 160" preserveAspectRatio="none" id="svg-${p.id}"></svg>
            `;
            gridEl.appendChild(card);
            toRender.push([p.id, rows, {height: 160, yMax: YMAX_OCC_PAIR_BY_ID[p.id] || YMAX_OCC_PAIR}]);
        }
        for (const sid of g.sectors) {
            const s = sectorById[sid];
            if (!s) continue;
            const rows = DATA.load[s.id] || [];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="title">
                    <span class="name">${s.id}</span>
                    <span class="label">${s.freq || ''} MHz</span>
                    <span class="peak">${peakLabel(rows)} · ${totalsBySector[s.id]||0} flt</span>
                </div>
                <svg viewBox="0 0 400 120" preserveAspectRatio="none" id="svg-${s.id}"></svg>
            `;
            gridEl.appendChild(card);
            toRender.push([s.id, rows, {height: 120, yMax: YMAX_OCC_SECTOR}]);
        }
        root.appendChild(section);
    }

    for (const [id, rows, opts] of toRender) drawChart(id, rows, xMin, xMax, opts);
}

function drawChart(sectorId, rows, xMin, xMax, opts) {
    const svg = document.getElementById(`svg-${sectorId}`);
    const W = 400, H = opts.height || 120;
    const M = {l: 28, r: 6, t: 8, b: 18};
    const plotW = W - M.l - M.r;
    const plotH = H - M.t - M.b;
    const bin = DATA.meta.bin_minutes;
    const maxCount = opts.yMax;
    const xScale = t => M.l + (t - xMin) / (xMax - xMin) * plotW;
    const yScale = v => M.t + plotH - (v / maxCount) * plotH;

    let html = '';
    // Gridlines
    for (let t = xMin; t <= xMax; t += 60) {
        const x = xScale(t);
        html += `<line class="grid-line" x1="${x}" y1="${M.t}" x2="${x}" y2="${M.t+plotH}"/>`;
        const hh = Math.floor(t / 60);
        html += `<text class="axis-label" x="${x}" y="${H-4}" text-anchor="middle">${String(hh).padStart(2,'0')}Z</text>`;
    }
    const tickStep = Math.max(1, Math.ceil(maxCount / 4));
    for (let v = 0; v <= maxCount; v += tickStep) {
        const y = yScale(v);
        html += `<line class="grid-line" x1="${M.l}" y1="${y}" x2="${M.l+plotW}" y2="${y}"/>`;
        html += `<text class="axis-label" x="${M.l-3}" y="${y+3}" text-anchor="end">${v}</text>`;
    }
    if (CAP > 0 && CAP <= maxCount) {
        const y = yScale(CAP);
        html += `<line class="cap-line" x1="${M.l}" y1="${y}" x2="${M.l+plotW}" y2="${y}"/>`;
    }

    if (rows.length) {
        const isPairForThis = !!(window._mc?.pair_load?.[sectorId]);
        const lowKey = isPairForThis ? 'pair_load_low' : 'load_low';
        const highKey = isPairForThis ? 'pair_load_high' : 'load_high';
        const lowRows  = (window._mc?.[lowKey]  || {})[sectorId] || [];
        const highRows = (window._mc?.[highKey] || {})[sectorId] || [];
        const cx = r => xScale(r.bin_minute) + (plotW / (xMax - xMin)) * bin / 2;
        const ptsFor = arr => arr.map(r => [cx(r), yScale(r.count)]);

        if (highRows.length) html += `<path class="line-high" d="${smoothPath(ptsFor(highRows))}"/>`;
        if (lowRows.length)  html += `<path class="line-low" d="${smoothPath(ptsFor(lowRows))}"/>`;
        html += `<path class="line-nominal" d="${smoothPath(ptsFor(rows))}"/>`;

        for (const r of rows) {
            const lowAt  = lowRows.find(x => x.bin_minute === r.bin_minute)?.count ?? 0;
            const highAt = highRows.find(x => x.bin_minute === r.bin_minute)?.count ?? 0;
            html += `<circle cx="${cx(r).toFixed(1)}" cy="${yScale(r.count).toFixed(1)}" r="3" fill="transparent" data-bin="${r.bin_minute}" data-count="${r.count}" data-lo="${lowAt}" data-hi="${highAt}"/>`;
        }
    }

    svg.innerHTML = html;
    svg.addEventListener('mousemove', e => {
        if (e.target.tagName === 'circle') {
            const c = e.target;
            const b = parseInt(c.getAttribute('data-bin'));
            const hh = String(Math.floor(b/60)).padStart(2,'0');
            const mm = String(b % 60).padStart(2,'0');
            TIP.textContent = `${hh}${mm}Z  count ${c.getAttribute('data-count')} · band [${c.getAttribute('data-lo')}, ${c.getAttribute('data-hi')}]`;
            TIP.style.left = (e.clientX + 10) + 'px';
            TIP.style.top = (e.clientY + 10) + 'px';
            TIP.style.opacity = '1';
        } else {
            TIP.style.opacity = '0';
        }
    });
    svg.addEventListener('mouseleave', () => TIP.style.opacity = '0');
}

load();
</script>
</body>
</html>
